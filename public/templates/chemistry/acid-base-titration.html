<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酸碱中和滴定</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .titration-canvas-wrapper {
    background: linear-gradient(180deg, #FAF5FF 0%, #F3E8FF 100%);
  }
  .indicator-dot {
    width: 16px; height: 16px; border-radius: 50%; display: inline-block; margin-right: 6px; border: 2px solid #ccc;
  }
</style>
</head>
<body>
<div class="eureka-root">

  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label">当前 pH</p>
      <p class="eureka-stat-value primary" id="stat-ph">1.00</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">已加碱体积</p>
      <p class="eureka-stat-value" id="stat-volume">0.0 mL</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">溶液颜色</p>
      <p class="eureka-stat-value" id="stat-color" style="display:flex;align-items:center;justify-content:center;gap:4px;">
        <span class="indicator-dot" id="color-dot" style="background:#fff;border-color:#999;"></span>
        <span id="color-name">无色</span>
      </p>
    </div>
  </div>

  <div class="eureka-canvas-wrapper titration-canvas-wrapper">
    <canvas id="canvas" class="eureka-canvas" width="560" height="320"></canvas>
    <div style="margin-top:8px;text-align:center;">
      <span id="status-badge" class="eureka-badge info">滴定进行中</span>
    </div>
  </div>

  <div class="eureka-card">
    <h3 class="eureka-card-title">参数调节</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">

      <div class="eureka-control">
        <div class="eureka-control-header">
          <span class="eureka-control-label">酸浓度 (HCl)</span>
          <span class="eureka-control-value"><span id="v-acidConc">0.10</span> mol/L</span>
        </div>
        <input id="ctl-acidConc" class="eureka-slider" type="range" min="0.01" max="1.0" step="0.01" value="0.1">
      </div>

      <div class="eureka-control">
        <div class="eureka-control-header">
          <span class="eureka-control-label">碱浓度 (NaOH)</span>
          <span class="eureka-control-value"><span id="v-baseConc">0.10</span> mol/L</span>
        </div>
        <input id="ctl-baseConc" class="eureka-slider" type="range" min="0.01" max="1.0" step="0.01" value="0.1">
      </div>

      <div class="eureka-control">
        <div class="eureka-control-header">
          <span class="eureka-control-label">酸体积</span>
          <span class="eureka-control-value"><span id="v-acidVolume">25</span> mL</span>
        </div>
        <input id="ctl-acidVolume" class="eureka-slider" type="range" min="10" max="50" step="1" value="25">
      </div>

      <div class="eureka-control">
        <div class="eureka-control-header">
          <span class="eureka-control-label">已加碱体积</span>
          <span class="eureka-control-value"><span id="v-baseAdded">0.0</span> mL</span>
        </div>
        <input id="ctl-baseAdded" class="eureka-slider" type="range" min="0" max="50" step="0.1" value="0">
      </div>

      <div class="eureka-control" style="grid-column: 1 / -1;">
        <div class="eureka-control-header">
          <span class="eureka-control-label">指示剂</span>
          <span class="eureka-control-value" id="v-indicator">酚酞</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <button class="eureka-btn" data-ind="0" style="flex:1;font-size:12px;">酚酞</button>
          <button class="eureka-btn" data-ind="1" style="flex:1;font-size:12px;">甲基橙</button>
          <button class="eureka-btn" data-ind="2" style="flex:1;font-size:12px;">石蕊</button>
        </div>
      </div>

      <div class="eureka-control">
        <div class="eureka-control-header">
          <span class="eureka-control-label">温度</span>
          <span class="eureka-control-value"><span id="v-temperature">25</span> °C</span>
        </div>
        <input id="ctl-temperature" class="eureka-slider" type="range" min="10" max="60" step="1" value="25">
      </div>

    </div>
  </div>

</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const state = {
    acidConc: 0.1,
    baseConc: 0.1,
    acidVolume: 25,
    baseAdded: 0,
    indicator: 0, // 0: 酚酞, 1: 甲基橙, 2: 石蕊
    temperature: 25,
  };

  const indicators = [
    { name: '酚酞', ranges: [{min:0, max:8.2, color:'#FFFFFF', name:'无色'},{min:8.2, max:10.0, color:'#FBCFE8', name:'粉红'},{min:10.0, max:14, color:'#DB2777', name:'红'}] },
    { name: '甲基橙', ranges: [{min:0, max:3.1, color:'#EF4444', name:'红'},{min:3.1, max:4.4, color:'#FB923C', name:'橙'},{min:4.4, max:14, color:'#FDE047', name:'黄'}] },
    { name: '石蕊', ranges: [{min:0, max:5.0, color:'#EF4444', name:'红'},{min:5.0, max:8.0, color:'#A855F7', name:'紫'},{min:8.0, max:14, color:'#3B82F6', name:'蓝'}] },
  ];

  function getPH() {
    const { acidConc, baseConc, acidVolume, baseAdded } = state;
    const acidMoles = acidConc * acidVolume;
    const baseMoles = baseConc * baseAdded;
    const totalVolume = acidVolume + baseAdded;

    if (baseAdded <= 0) return -Math.log10(acidConc);
    if (Math.abs(baseMoles - acidMoles) < 1e-10) return 7.0;
    if (baseMoles < acidMoles) {
      const h = (acidMoles - baseMoles) / totalVolume;
      return -Math.log10(Math.max(h, 1e-14));
    }
    const oh = (baseMoles - acidMoles) / totalVolume;
    const pOH = -Math.log10(Math.max(oh, 1e-14));
    return 14 - pOH;
  }

  function getIndicatorColor(ph) {
    const ind = indicators[state.indicator];
    for (const r of ind.ranges) {
      if (ph >= r.min && ph <= r.max) return r;
    }
    return ind.ranges[ind.ranges.length - 1];
  }

  function getEquivalenceVolume() {
    return (state.acidConc * state.acidVolume) / state.baseConc;
  }

  function updateDisplay() {
    const ph = getPH();
    const colorInfo = getIndicatorColor(ph);
    const eqVol = getEquivalenceVolume();

    document.getElementById('stat-ph').textContent = ph.toFixed(2);
    document.getElementById('stat-volume').textContent = state.baseAdded.toFixed(1) + ' mL';
    document.getElementById('color-dot').style.background = colorInfo.color;
    document.getElementById('color-name').textContent = colorInfo.name;

    const badge = document.getElementById('status-badge');
    if (Math.abs(state.baseAdded - eqVol) < 0.2) {
      badge.className = 'eureka-badge success';
      badge.textContent = '等当点！V碱 = ' + eqVol.toFixed(1) + ' mL';
    } else if (state.baseAdded > eqVol) {
      badge.className = 'eureka-badge danger';
      badge.textContent = '碱过量';
    } else {
      badge.className = 'eureka-badge info';
      badge.textContent = '滴定进行中';
    }

    return { ph, colorInfo, eqVol };
  }

  function draw() {
    const { ph, colorInfo, eqVol } = updateDisplay();
    const w = canvas.width, h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    // Background table
    ctx.fillStyle = '#F3E8FF';
    ctx.fillRect(0, 0, w, h);

    // Flask
    const fx = w / 2, fy = h - 40;
    const flaskW = 80, flaskH = 100, neckW = 30, neckH = 40;

    // Draw flask body
    ctx.beginPath();
    ctx.moveTo(fx - neckW/2, fy - flaskH - neckH);
    ctx.lineTo(fx + neckW/2, fy - flaskH - neckH);
    ctx.lineTo(fx + flaskW/2, fy);
    ctx.quadraticCurveTo(fx, fy + 10, fx - flaskW/2, fy);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fill();
    ctx.strokeStyle = '#7C3AED';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Liquid in flask
    const liquidLevel = fy - (state.baseAdded / 60) * flaskH * 0.5 - 10;
    const liquidH = fy - liquidLevel;
    if (liquidH > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(fx - neckW/2 - (flaskW-neckW)/2 * (liquidH/flaskH), liquidLevel);
      ctx.lineTo(fx + neckW/2 + (flaskW-neckW)/2 * (liquidH/flaskH), liquidLevel);
      ctx.lineTo(fx + flaskW/2, fy);
      ctx.quadraticCurveTo(fx, fy + 10, fx - flaskW/2, fy);
      ctx.closePath();
      ctx.clip();
      ctx.fillStyle = colorInfo.color;
      ctx.globalAlpha = 0.7;
      ctx.fillRect(fx - flaskW/2, liquidLevel, flaskW, liquidH);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Burette
    const bx = fx + 90, by = 20;
    ctx.fillStyle = 'rgba(200,200,200,0.5)';
    ctx.fillRect(bx - 6, by, 12, h - 100);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx - 6, by, 12, h - 100);

    // Scale on burette
    ctx.fillStyle = '#333';
    ctx.font = '10px system-ui';
    for (let i = 0; i <= 50; i += 10) {
      const y = by + 10 + i * 4;
      ctx.fillRect(bx + 6, y, 6, 1);
      ctx.fillText(i + '', bx + 14, y + 3);
    }

    // Burette liquid level
    const buretteLevel = by + 10 + state.baseAdded * 4;
    ctx.fillStyle = 'rgba(100,149,237,0.4)';
    ctx.fillRect(bx - 5, buretteLevel, 10, (by + 210) - buretteLevel);

    // Stopcock
    ctx.beginPath();
    ctx.arc(bx, by + 215, 8, 0, Math.PI * 2);
    ctx.fillStyle = '#666';
    ctx.fill();

    // Drops
    if (state.baseAdded > 0 && state.baseAdded < 50) {
      ctx.fillStyle = 'rgba(100,149,237,0.6)';
      ctx.beginPath();
      ctx.arc(bx, by + 225 + (Date.now() % 500) / 20, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // pH meter
    ctx.fillStyle = '#FFF';
    ctx.fillRect(20, 20, 80, 40);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.strokeRect(20, 20, 80, 40);
    ctx.fillStyle = '#333';
    ctx.font = 'bold 18px system-ui';
    ctx.fillText('pH ' + ph.toFixed(2), 28, 46);

    // Info text
    ctx.fillStyle = '#6B21A8';
    ctx.font = '12px system-ui';
    ctx.fillText('指示剂: ' + indicators[state.indicator].name, 20, h - 60);
    ctx.fillText('等当点体积: ' + eqVol.toFixed(1) + ' mL', 20, h - 45);
  }

  function setupSlider(id, key, digits) {
    const el = document.getElementById('ctl-' + id);
    if (!el) return;
    el.addEventListener('input', (e) => {
      state[key] = parseFloat(e.target.value);
      document.getElementById('v-' + id).textContent = state[key].toFixed(digits || 0);
      draw();
    });
  }

  setupSlider('acidConc', 'acidConc', 2);
  setupSlider('baseConc', 'baseConc', 2);
  setupSlider('acidVolume', 'acidVolume', 0);
  setupSlider('baseAdded', 'baseAdded', 1);
  setupSlider('temperature', 'temperature', 0);

  document.querySelectorAll('[data-ind]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      state.indicator = parseInt(e.target.dataset.ind);
      document.getElementById('v-indicator').textContent = indicators[state.indicator].name;
      document.querySelectorAll('[data-ind]').forEach(b => b.classList.remove('primary'));
      e.target.classList.add('primary');
      draw();
    });
  });

  // Animation loop
  function animate() {
    draw();
    requestAnimationFrame(animate);
  }
  animate();

  // Signal ready
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'ready', experimentId: 'chemistry/acid-base-titration' }, '*');
  }
</script>
</body>
</html>
