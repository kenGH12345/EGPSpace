<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酸碱中和滴定</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .titration-canvas-wrapper {
    background: linear-gradient(180deg, #FAF5FF 0%, #F3E8FF 100%);
  }
  .indicator-dot {
    width: 16px; height: 16px; border-radius: 50%; display: inline-block;
    margin-right: 6px; border: 2px solid #ccc;
  }
</style>
</head>
<body>
<div class="eureka-root">

  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label">当前 pH</p>
      <p class="eureka-stat-value primary" id="stat-ph">1.00</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">已加碱体积</p>
      <p class="eureka-stat-value" id="stat-volume">0.0 mL</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">溶液颜色</p>
      <p class="eureka-stat-value" id="stat-color"
         style="display:flex;align-items:center;justify-content:center;gap:4px;">
        <span class="indicator-dot" id="color-dot" style="background:#fff;border-color:#999;"></span>
        <span id="color-name">无色</span>
      </p>
    </div>
  </div>

  <div class="eureka-canvas-wrapper titration-canvas-wrapper">
    <canvas id="canvas" class="eureka-canvas" width="560" height="260"></canvas>
    <div style="margin-top:8px;text-align:center;">
      <span id="status-badge" class="eureka-badge info">滴定进行中</span>
    </div>
  </div>

  <div class="eureka-card">
    <h3 class="eureka-card-title">参数调节</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <div class="eureka-control">
        <div class="eureka-control-header">
          <span class="eureka-control-label">酸浓度 (HCl)</span>
          <span class="eureka-control-value"><span id="v-acidConc">0.10</span> mol/L</span>
        </div>
        <input id="ctl-acidConc" class="eureka-slider" type="range" min="0.01" max="1.0" step="0.01" value="0.1">
      </div>
      <div class="eureka-control">
        <div class="eureka-control-header">
          <span class="eureka-control-label">碱浓度 (NaOH)</span>
          <span class="eureka-control-value"><span id="v-baseConc">0.10</span> mol/L</span>
        </div>
        <input id="ctl-baseConc" class="eureka-slider" type="range" min="0.01" max="1.0" step="0.01" value="0.1">
      </div>
      <div class="eureka-control">
        <div class="eureka-control-header">
          <span class="eureka-control-label">酸体积</span>
          <span class="eureka-control-value"><span id="v-acidVolume">25</span> mL</span>
        </div>
        <input id="ctl-acidVolume" class="eureka-slider" type="range" min="10" max="50" step="1" value="25">
      </div>
      <div class="eureka-control">
        <div class="eureka-control-header">
          <span class="eureka-control-label">已加碱体积</span>
          <span class="eureka-control-value"><span id="v-baseAdded">0.0</span> mL</span>
        </div>
        <input id="ctl-baseAdded" class="eureka-slider" type="range" min="0" max="50" step="0.1" value="0">
      </div>
      <div class="eureka-control" style="grid-column: 1 / -1;">
        <div class="eureka-control-header">
          <span class="eureka-control-label">指示剂</span>
          <span class="eureka-control-value" id="v-indicator">酚酞</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <button class="eureka-btn" data-ind="0" style="flex:1;font-size:12px;">酚酞</button>
          <button class="eureka-btn" data-ind="1" style="flex:1;font-size:12px;">甲基橙</button>
          <button class="eureka-btn" data-ind="2" style="flex:1;font-size:12px;">石蕊</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- L3 shared atoms (v3-component) -->
<script src="/templates/_shared/experiment-core.js"></script>
<script src="/templates/_shared/ui-core.js"></script>
<script src="/templates/_shared/chemistry-draw.js"></script>
<script src="/templates/_shared/component-mirror.js"></script>
<script src="/templates/_shared/chemistry-builder.js"></script>
<script>
  'use strict';

  const TEMPLATE_ID = 'chemistry/acid-base-titration';
  const ENGINE_ID = 'chemistry/titration';

  if (!window.__EUREKA_UI_LOADED) {
    console.error('[titration] L3 shared atoms failed to load');
  }

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const CD = window.EurekaChemistryDraw;
  const UI = window.EurekaUI;

  const INDICATOR_NAMES = ['酚酞', '甲基橙', '石蕊'];

  const state = {
    acidConc: 0.1,
    baseConc: 0.1,
    acidVolume: 25,
    baseAdded: 0,
    indicator: 0,
    temperature: 25,
  };

  let lastResult = null;

  function buildGraph() {
    if (!window.ChemistryBuilder) return undefined;
    const cb = new window.ChemistryBuilder();
    cb.flask({ id: 'Flask1', formula: 'HCl', volumeML: state.acidVolume + state.baseAdded });
    // ChemistryBuilder does not have a burette yet, but we can pass it anyway via ._add
    cb._add('burette', { level: state.baseAdded });
    return cb.toSpec();
  }

  async function recompute() {
    const params = {
      acid_concentration: state.acidConc,
      base_concentration: state.baseConc,
      acid_volume: state.acidVolume,
      base_volume: state.baseAdded,
      indicator: state.indicator,
      graph: buildGraph(),
    };
    try {
      const r = await window.requestCompute(ENGINE_ID, params);
      lastResult = r;
      applyResult(r);
    } catch (err) {
      console.error('[titration] compute failed:', err.message);
    }
  }

  function applyResult(r) {
    const v = r.values;
    UI.updateStat('stat-ph', UI.formatNum(v.pH, 2), 'primary');
    UI.updateStat('stat-volume', UI.formatNum(state.baseAdded, 1) + ' mL');

    // Color swatch from engine's computed indicatorColor
    document.getElementById('color-dot').style.background = v.indicatorColor;
    document.getElementById('color-name').textContent = v.colorName;

    let badgeKind = 'info';
    let badgeText = '滴定进行中';
    if (v.stateLabel === '等当点') {
      badgeKind = 'success';
      badgeText = '等当点！V碱 ≈ ' + UI.formatNum(v.equivalenceVolume, 1) + ' mL';
    } else if (v.stateLabel === '碱过量') {
      badgeKind = 'danger';
      badgeText = '碱过量';
    } else if (v.stateLabel === '酸过量' || v.stateLabel === '初始（纯酸）') {
      badgeKind = 'info';
      badgeText = '滴定进行中';
    }
    UI.updateBadge('status-badge', badgeText, badgeKind);

    draw();
  }

  function draw() {
    if (!lastResult) return;
    const v = lastResult.values;
    const W = canvas.width, H = canvas.height;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#F3E8FF';
    ctx.fillRect(0, 0, W, H);

    if (window.EurekaComponentMirror && v.components) {
      window.EurekaComponentMirror.render(ctx, v.components);
    }

    if (CD) {
      // Burette (top-center)
    const buretteX = W / 2 - 10;
    const buretteY = 20;
    const buretteH = 90;
    CD.drawBurette(ctx, {
      x: buretteX, y: buretteY, height: buretteH, width: 20,
      fillLevel: Math.max(0, 1 - v.buretteLevel / 100),
      fillColor: '#A78BFA',
      label: 'NaOH',
    });

    // Falling drop (animates with baseAdded position)
    if (state.baseAdded > 0 && state.baseAdded < v.equivalenceVolume * 1.1) {
      const dropY = buretteY + buretteH + 10 + ((Date.now() / 10) % 60);
      CD.drawIndicatorDrop(ctx, {
        x: W / 2, y: Math.min(dropY, H - 80), radius: 4,
        color: '#A78BFA', alpha: 0.7,
      });
    }

    // Conical flask (below burette) — fill level scales with total volume
    const flaskFill = Math.min(1, (state.acidVolume + state.baseAdded) / 80);
    CD.drawBeakerWithLiquid(ctx, {
      left: W / 2 - 60, right: W / 2 + 60,
      top: H - 130, bottom: H - 20,
      liquidColor: v.indicatorColor,
      level: flaskFill,
      label: '锥形瓶 · ' + INDICATOR_NAMES[state.indicator],
    });

    // pH scale (right side)
    CD.drawPhScale(ctx, {
      x: W - 180, y: H - 60, width: 150, height: 14,
      currentPh: v.pH,
    });

    // Readout
    ctx.save();
    ctx.font = 'bold 12px system-ui';
    ctx.fillStyle = '#4C1D95';
    ctx.fillText('pH = ' + UI.formatNum(v.pH, 2), 20, 30);
    ctx.font = '11px system-ui';
    ctx.fillStyle = '#6B21A8';
    ctx.fillText('V等当 = ' + UI.formatNum(v.equivalenceVolume, 1) + ' mL', 20, 48);
    ctx.fillText(v.speciesLabel, 20, 66);
    ctx.restore();
    }
  }

  // Wire up sliders
  UI.bindExistingSliders({
    acidConc:    (x) => { state.acidConc = x;    recompute(); },
    baseConc:    (x) => { state.baseConc = x;    recompute(); },
    acidVolume:  (x) => { state.acidVolume = x;  recompute(); },
    baseAdded:   (x) => { state.baseAdded = x;   recompute(); },
  });

  // Indicator buttons
  document.querySelectorAll('button[data-ind]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.indicator = Number(btn.getAttribute('data-ind'));
      document.getElementById('v-indicator').textContent = INDICATOR_NAMES[state.indicator];
      recompute();
    });
  });

  window.EurekaHost.setTemplateId(TEMPLATE_ID);
  recompute().then(() => {
    window.EurekaHost.emitReady(['acidConc', 'baseConc', 'acidVolume', 'baseAdded', 'indicator']);
  });

  // Redraw continuously so drop animation runs (low cost; engine isn't called)
  setInterval(() => { if (lastResult) draw(); }, 100);
</script>
</body>
</html>
