<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>化学反应速率</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .rate-canvas-wrapper {
    background: #1a1a2e;
    border: 1px solid #E5E7EB;
    border-radius: 8px;
    overflow: hidden;
  }
  .rate-canvas-wrapper canvas { max-width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div class="eureka-root">
  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label">转化率</p>
      <p class="eureka-stat-value primary" id="stat-conv">0 %</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">反应速率</p>
      <p class="eureka-stat-value" id="stat-rate">0 M/s</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">速率常数 k</p>
      <p class="eureka-stat-value danger" id="stat-k">0</p>
    </div>
  </div>

  <div class="eureka-card" style="margin-top:12px;">
    <div class="eureka-card-header">
      <span>反应动力学 · 曲线</span>
      <span class="badge-info" id="arch-version">v3-component · ReactionRateEngine</span>
    </div>
    <div class="rate-canvas-wrapper">
      <canvas id="canvas" width="640" height="300"></canvas>
    </div>
  </div>

  <div class="eureka-card" style="margin-top:12px;">
    <div class="eureka-card-header"><span>参数控制</span></div>
    <div class="eureka-controls">
      <div class="eureka-control">
        <label>初始浓度 [A]₀ (M)</label>
        <input type="range" class="eureka-slider" id="ctrl-conc" min="0.1" max="2.0" step="0.1" value="1.0">
        <span class="eureka-slider-value" id="val-conc">1.0</span>
      </div>
      <div class="eureka-control">
        <label>温度 T (°C)</label>
        <input type="range" class="eureka-slider" id="ctrl-temp" min="0" max="100" step="1" value="25">
        <span class="eureka-slider-value" id="val-temp">25</span>
      </div>
      <div class="eureka-control">
        <label>时间 t (s)</label>
        <input type="range" class="eureka-slider" id="ctrl-time" min="0" max="120" step="1" value="10">
        <span class="eureka-slider-value" id="val-time">10</span>
      </div>
      <div class="eureka-control">
        <label>催化剂</label>
        <select id="ctrl-catalyst" class="eureka-slider">
          <option value="0" selected>无催化剂</option>
          <option value="1">有催化剂</option>
        </select>
      </div>
    </div>
  </div>
</div>

<script src="/templates/_shared/experiment-core.js"></script>
<script src="/templates/_shared/ui-core.js"></script>

<script>
(function () {
  'use strict';
  
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  const state = {
    conc: 1.0,
    temp: 25,
    time: 10,
    catalyst: 0
  };

  async function recompute() {
    try {
      const r = await window.requestCompute('chemistry/reaction-rate', {
        initial_concentration: state.conc,
        temperature: state.temp,
        time: state.time,
        catalyst: state.catalyst
      });
      applyResult(r);
    } catch (e) {
      console.error(e);
    }
  }

  function applyResult(r) {
    const v = r.values;
    document.getElementById('stat-conv').textContent = (v.conversion || 0).toFixed(1) + ' %';
    document.getElementById('stat-rate').textContent = (v.rate || 0).toExponential(2) + ' M/s';
    document.getElementById('stat-k').textContent = (v.rateConstant || 0).toExponential(2);

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw basic graph
    const padding = 40;
    const w = canvas.width - padding * 2;
    const h = canvas.height - padding * 2;
    
    ctx.strokeStyle = '#8888aa';
    ctx.beginPath();
    ctx.moveTo(padding, padding);
    ctx.lineTo(padding, padding + h);
    ctx.lineTo(padding + w, padding + h);
    ctx.stroke();
    
    ctx.fillStyle = '#fff';
    ctx.fillText('时间 (s)', padding + w/2, padding + h + 20);
    ctx.fillText('浓度 [A] (M)', padding - 30, padding - 10);
    
    // Calculate curve based on k
    const k = v.rateConstant || 0;
    const maxT = 120;
    const maxC = 2.0;
    
    ctx.strokeStyle = state.catalyst ? '#ff8c42' : '#00ffaa';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let t = 0; t <= maxT; t++) {
      const c = state.conc * Math.exp(-k * t);
      const x = padding + (t / maxT) * w;
      const y = padding + h - (c / maxC) * h;
      if (t === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    
    // Draw current point
    const currX = padding + (state.time / maxT) * w;
    const currC = state.conc * Math.exp(-k * state.time);
    const currY = padding + h - (currC / maxC) * h;
    
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.arc(currX, currY, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  function bindSlider(id, key) {
    const el = document.getElementById('ctrl-' + id);
    const val = document.getElementById('val-' + id);
    el.addEventListener('input', () => {
      if(val) val.textContent = el.value;
      state[key] = parseFloat(el.value);
      recompute();
    });
  }
  
  bindSlider('conc', 'conc');
  bindSlider('temp', 'temp');
  bindSlider('time', 'time');
  
  document.getElementById('ctrl-catalyst').addEventListener('change', (e) => {
    state.catalyst = parseInt(e.target.value, 10);
    recompute();
  });

  window.EurekaHost.setTemplateId('chemistry/reaction-rate');
  recompute().then(() => window.EurekaHost.emitReady(['initial_concentration', 'temperature', 'time', 'catalyst']));
})();
</script>
</body>
</html>
