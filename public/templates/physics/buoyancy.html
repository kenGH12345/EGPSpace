<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>浮力原理</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .buoyancy-canvas-wrapper {
    background: linear-gradient(180deg, #F0F9FF 0%, #E0F2FE 100%);
  }
</style>
</head>
<body>
<div class="eureka-root">

  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label">浮力 F浮</p>
      <p class="eureka-stat-value primary" id="stat-buoyancy">0.0 N</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">重力 G</p>
      <p class="eureka-stat-value danger" id="stat-gravity">0.0 N</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">状态</p>
      <p class="eureka-stat-value success" id="stat-status">悬浮</p>
    </div>
  </div>

  <div class="eureka-canvas-wrapper buoyancy-canvas-wrapper">
    <canvas id="canvas" class="eureka-canvas" width="560" height="240"></canvas>
    <div style="margin-top: 8px; text-align: center;">
      <span id="status-badge" class="eureka-badge info">悬浮</span>
    </div>
  </div>

  <div class="eureka-card">
    <h3 class="eureka-card-title">参数调节</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <div class="eureka-control">
        <div class="eureka-control-header">
          <span class="eureka-control-label">物体体积</span>
          <span class="eureka-control-value"><span id="v-volume">50</span> cm³</span>
        </div>
        <input id="ctl-volume" class="eureka-slider" type="range" min="10" max="200" value="50">
      </div>
      <div class="eureka-control">
        <div class="eureka-control-header">
          <span class="eureka-control-label">物体密度 (ρ物)</span>
          <span class="eureka-control-value"><span id="v-objectDensity">800</span> kg/m³</span>
        </div>
        <input id="ctl-objectDensity" class="eureka-slider" type="range" min="200" max="2000" step="50" value="800">
      </div>
      <div class="eureka-control">
        <div class="eureka-control-header">
          <span class="eureka-control-label">液体密度 (ρ液)</span>
          <span class="eureka-control-value"><span id="v-liquidDensity">1000</span> kg/m³</span>
        </div>
        <input id="ctl-liquidDensity" class="eureka-slider" type="range" min="800" max="13600" step="100" value="1000">
      </div>
    </div>
  </div>

</div>

<!-- L3 shared atoms (v3-component) -->
<script src="/templates/_shared/experiment-core.js"></script>
<script src="/templates/_shared/ui-core.js"></script>
<script src="/templates/_shared/component-mirror.js"></script>
<script src="/templates/_shared/physics-draw.js"></script>
<script src="/templates/_shared/physics-builder.js"></script>
<script>
  'use strict';

  const TEMPLATE_ID = 'physics/buoyancy';
  const ENGINE_ID = 'physics/buoyancy';

  // Startup guard (ADR R4): make sure L3 atoms loaded
  if (!window.__EUREKA_UI_LOADED) {
    console.error('[buoyancy] L3 shared atoms failed to load');
  }

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const PD = window.EurekaPhysicsDraw;
  const UI = window.EurekaUI;

  // Local state mirrors slider values; compute always delegated to engine
  const state = {
    volume: 50,
    objectDensity: 800,
    liquidDensity: 1000,
  };

  let lastResult = null;

  function buildGraph() {
    if (!window.PhysicsBuilder) return undefined;
    const pb = new window.PhysicsBuilder();
    pb.liquidContainer({ id: 'Liquid1', liquidDensity: state.liquidDensity, depth: 1 });
    pb.block({ id: 'Block1', density: state.objectDensity, volume: state.volume / 1000000 });
    return pb.toSpec();
  }

  async function recompute() {
    // volume cm³ → m³ for engine; gravity fixed at 9.8
    const params = {
      objectDensity: state.objectDensity,
      liquidDensity: state.liquidDensity,
      volume: state.volume / 1_000_000,
      g: 9.8,
      graph: buildGraph(),
    };
    try {
      const r = await window.requestCompute(ENGINE_ID, params);
      lastResult = r;
      applyResult(r);
    } catch (err) {
      console.error('[buoyancy] compute failed:', err.message);
    }
  }

  function applyResult(r) {
    const v = r.values;
    UI.updateStat('stat-buoyancy', UI.formatNum(v.buoyantForce, 1) + ' N', 'primary');
    UI.updateStat('stat-gravity', UI.formatNum(v.gravity, 1) + ' N', 'danger');
    UI.updateStat('stat-status', v.floatState,
      v.badgeKind === 'success' ? 'success' :
      v.badgeKind === 'danger' ? 'danger' : 'info');
    UI.updateBadge('status-badge', v.badgeText, v.badgeKind);
    draw();
  }

  function draw() {
    if (!lastResult) return;
    const v = lastResult.values;
    const W = canvas.width, H = canvas.height;
    const liquidLevel = H * 0.55;

    ctx.clearRect(0, 0, W, H);

    if (window.EurekaComponentMirror && v.components) {
      window.EurekaComponentMirror.render(ctx, v.components);
    }

    if (PD) {
      // Liquid (colour scales with density)
    const liqColor =
      state.liquidDensity > 2000 ? '#1E40AF' :
      state.liquidDensity > 1500 ? '#0891B2' :
      state.liquidDensity > 1000 ? '#06B6D4' : '#67E8F9';
    PD.drawLiquidFill(ctx, {
      x: 0, y: liquidLevel, width: W, height: H - liquidLevel,
      color: liqColor, alpha: 0.5, drawSurface: true,
    });

    // Beaker
    const beakerLeft = W / 2 - 100;
    const beakerRight = W / 2 + 100;
    const beakerBottom = H - 10;
    PD.drawBeaker(ctx, {
      left: beakerLeft, right: beakerRight,
      top: liquidLevel - 20, bottom: beakerBottom,
      label: '烧杯',
    });

    // Object (size from volume, position from engine's floatState/immersionRatio)
    const objW = Math.max(30, Math.min(state.volume * 0.5, 90));
    const objH = Math.max(20, Math.min(state.volume * 0.6, 120));
    const containerBottom = beakerBottom - 5;
    const densityRatio = state.objectDensity / state.liquidDensity;
    let objY;
    if (v.floatState === '上浮') {
      objY = liquidLevel - objH * densityRatio;
    } else if (v.floatState === '下沉') {
      objY = containerBottom - objH;
    } else {
      objY = liquidLevel;
    }
    objY = Math.max(liquidLevel - objH, Math.min(objY, containerBottom - objH));
    const objX = W / 2 - objW / 2;

    PD.drawGradientBlock(ctx, {
      x: objX, y: objY, width: objW, height: objH,
      hue: v.hue,
      text: state.objectDensity + 'kg/m³',
      subtext: v.materialName,
    });

    // Immersed darken overlay
    const immersedH = Math.max(0, Math.min(objH, liquidLevel - objY));
    if (immersedH > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(objX + 2, objY + objH - immersedH, objW - 4, immersedH);
    }

    // Buoyancy arrow (up, from object top)
    PD.drawForceArrow(ctx, {
      x: objX + objW / 2, y: objY + 5,
      magnitude: v.buoyantForce, direction: 'up',
      color: '#3B82F6',
      label: '↑ F浮 ' + UI.formatNum(v.buoyantForce, 1) + 'N',
    });

    // Gravity arrow (down, from object bottom)
    PD.drawForceArrow(ctx, {
      x: objX + objW / 2, y: objY + objH - 5,
      magnitude: v.gravity, direction: 'down',
      color: '#EF4444',
      label: '↓ G ' + UI.formatNum(v.gravity, 1) + 'N',
    });

    // State label above object
    ctx.save();
    ctx.font = 'bold 13px system-ui';
    ctx.fillStyle = v.badgeKind === 'success' ? '#059669'
                  : v.badgeKind === 'danger' ? '#DC2626' : '#2563EB';
    const arrow = v.floatState === '上浮' ? '▲' : v.floatState === '下沉' ? '▼' : '●';
    ctx.textAlign = 'center';
    ctx.fillText(arrow + ' ' + v.floatState, objX + objW / 2, objY - 18);
    ctx.textAlign = 'left';
    ctx.restore();

    // Liquid label
    ctx.save();
    ctx.font = '11px system-ui';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText('液 ρ=' + state.liquidDensity + 'kg/m³',
      beakerLeft + 8, (liquidLevel + beakerBottom) / 2);
    ctx.fillStyle = '#64748B';
    ctx.fillText('V=' + state.volume + 'cm³',
      beakerRight + 5, objY + objH / 2);
    ctx.restore();
    }
  }

  // Wire up existing sliders
  UI.bindExistingSliders({
    volume: (v) => { state.volume = v; recompute(); },
    objectDensity: (v) => { state.objectDensity = v; recompute(); },
    liquidDensity: (v) => { state.liquidDensity = v; recompute(); },
  });

  // Initial compute + ready
  window.EurekaHost.setTemplateId(TEMPLATE_ID);
  recompute().then(() => {
    window.EurekaHost.emitReady(['volume', 'objectDensity', 'liquidDensity']);
  });
</script>
</body>
</html>
