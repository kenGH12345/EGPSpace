<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>机械波的形成与传播</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .wave-canvas-wrap {
    position: relative;
    background: linear-gradient(180deg, #F8FAFC 0%, #E2E8F0 100%);
  }
  .wave-overlay {
    position: absolute; top: 12px; left: 16px;
    background: rgba(255,255,255,0.92);
    padding: 8px 12px; border-radius: 8px;
    font-size: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .wave-overlay .k { color: #6B7280; }
  .wave-overlay .v { font-weight: 600; color: #1F2937; }
</style>
</head>
<body>
<div class="eureka-root">
  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label">波速 v</p>
      <p class="eureka-stat-value primary" id="stat-speed">0.0 m/s</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">频率 f</p>
      <p class="eureka-stat-value danger" id="stat-freq">0.0 Hz</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">波长 λ</p>
      <p class="eureka-stat-value success" id="stat-lambda">0.0 m</p>
    </div>
  </div>

  <div class="eureka-canvas-wrapper wave-canvas-wrap">
    <canvas id="wave1-canvas" class="eureka-canvas" width="680" height="160"></canvas>
    <div class="wave-overlay">
      <div><span class="k">波1</span> <span class="v">实线</span></div>
      <div><span class="k">波2</span> <span class="v">虚线</span></div>
    </div>
  </div>

  <div class="eureka-canvas-wrapper wave-canvas-wrap">
    <canvas id="superpose-canvas" class="eureka-canvas" width="680" height="160"></canvas>
  </div>

  <div class="eureka-card">
    <h3 class="eureka-card-title">波1 参数</h3>
    <div id="params-root"></div>
  </div>

  <div class="eureka-card">
    <h3 class="eureka-card-title">波2 参数</h3>
    <div id="params2-root"></div>
  </div>

  <div class="eureka-formula">
    <p class="eureka-formula-title">机械波</p>
    <div class="eureka-formula-expression">
      v = λf &nbsp;&nbsp;&nbsp; y = A sin(2π(x/λ – ft))
    </div>
  </div>
</div>

<script src="/templates/_shared/experiment-core.js"></script>
<script src="/templates/_shared/physics-utils.js"></script>
<script>
(function () {
  'use strict';
  const TEMPLATE_ID = 'physics/waves';
  EurekaHost.setTemplateId(TEMPLATE_ID);

  bindParam('A1', { min: 0.5, max: 3, step: 0.1, defaultValue: 1,
    label: '波1 振幅 A₁', unit: 'cm', container: document.getElementById('params-root'), });
  bindParam('lam1', { min: 0.2, max: 2, step: 0.05, defaultValue: 0.8,
    label: '波1 波长 λ₁', unit: 'm', container: document.getElementById('params-root'), });
  bindParam('f1', { min: 0.2, max: 5, step: 0.1, defaultValue: 1,
    label: '波1 频率 f₁', unit: 'Hz', container: document.getElementById('params-root'), });

  bindParam('A2', { min: 0.5, max: 3, step: 0.1, defaultValue: 1,
    label: '波2 振幅 A₂', unit: 'cm', container: document.getElementById('params2-root'), });
  bindParam('lam2', { min: 0.2, max: 2, step: 0.05, defaultValue: 0.8,
    label: '波2 波长 λ₂', unit: 'm', container: document.getElementById('params2-root'), });
  bindParam('f2', { min: 0.2, max: 5, step: 0.1, defaultValue: 1,
    label: '波2 频率 f₂', unit: 'Hz', container: document.getElementById('params2-root'), });

  const c1 = document.getElementById('wave1-canvas');
  const c2 = document.getElementById('superpose-canvas');
  const ctx1 = EurekaCanvas2D.setupHiDPI(c1, 680, 160);
  const ctx2 = EurekaCanvas2D.setupHiDPI(c2, 680, 160);

  const cssW = 680, cssH = 160;
  const margin = { top: 20, right: 20, bottom: 30, left: 50 };
  const statSpd = document.getElementById('stat-speed');
  const statFreq = document.getElementById('stat-freq');
  const statLambda = document.getElementById('stat-lambda');

  function getP() {
    return {
      A1: getParam('A1'), lam1: getParam('lam1'), f1: getParam('f1'),
      A2: getParam('A2'), lam2: getParam('lam2'), f2: getParam('f2'),
    };
  }

  function drawWave(ctx, p, time) {
    EurekaCanvas2D.clear(ctx, cssW, cssH, '#F8FAFC');
    const cw = cssW - margin.left - margin.right;
    const ch = cssH - margin.top - margin.bottom;
    const ox = margin.left, oy = cssH - margin.top - ch / 2;

    ctx.save();
    ctx.strokeStyle = '#D1D5DB';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i <= 20; i++) {
      const px = ox + (i / 20) * cw;
      ctx.moveTo(px, margin.top);
      ctx.lineTo(px, cssH - margin.bottom);
    }
    ctx.stroke();

    ctx.strokeStyle = '#3B82F6';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    const xMax = 5;
    for (let i = 0; i <= 200; i++) {
      const x = (i / 200) * xMax;
      const y = EurekaPhysics.waveDisplacement(p.A1 * 0.01, p.lam1, p.f1, time, x);
      const px = ox + (x / xMax) * cw;
      const py = oy - y * (ch / 0.06);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    ctx.strokeStyle = '#F59E0B';
    ctx.setLineDash([6, 4]);
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i <= 200; i++) {
      const x = (i / 200) * xMax;
      const y = EurekaPhysics.waveDisplacement(p.A2 * 0.01, p.lam2, p.f2, time, x);
      const px = ox + (x / xMax) * cw;
      const py = oy - y * (ch / 0.06);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.strokeStyle = '#6B7280';
    ctx.beginPath();
    ctx.moveTo(ox, oy);
    ctx.lineTo(ox + cw, oy);
    ctx.stroke();

    ctx.fillStyle = '#374151';
    ctx.font = '12px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('位置 x (m)', ox + cw / 2, cssH - 6);
    ctx.restore();
  }

  function drawSuperpose(ctx, p, time) {
    EurekaCanvas2D.clear(ctx, cssW, cssH, '#F8FAFC');
    const cw = cssW - margin.left - margin.right;
    const ch = cssH - margin.top - margin.bottom;
    const ox = margin.left, oy = cssH - margin.top - ch / 2;

    ctx.save();
    ctx.strokeStyle = '#6B7280';
    ctx.beginPath();
    ctx.moveTo(ox, oy);
    ctx.lineTo(ox + cw, oy);
    ctx.stroke();

    ctx.strokeStyle = '#8B5CF6';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    const xMax = 5;
    for (let i = 0; i <= 200; i++) {
      const x = (i / 200) * xMax;
      const s = EurekaPhysics.superposition(
        p.A1 * 0.01, p.lam1, p.f1,
        p.A2 * 0.01, p.lam2, p.f2,
        time, x
      );
      const px = ox + (x / xMax) * cw;
      const py = oy - s.total * (ch / 0.06);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    ctx.fillStyle = '#374151';
    ctx.font = '12px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('位置 x (m)', ox + cw / 2, cssH - 6);
    ctx.restore();
  }

  function update(dt) {
    const p = getP();
    const t = Date.now() / 1000;

    drawWave(ctx1, p, t);
    drawSuperpose(ctx2, p, t);

    const v = EurekaPhysics.waveSpeed(p.lam1, p.f1);
    statSpd.textContent = v.toFixed(1) + ' m/s';
    statFreq.textContent = p.f1.toFixed(1) + ' Hz';
    statLambda.textContent = p.lam1.toFixed(2) + ' m';

    EurekaHost.emitResultUpdate({
      waveSpeed: Number(v.toFixed(3)),
      amplitude1: Number(p.A1.toFixed(2)),
      wavelength1: Number(p.lam1.toFixed(2)),
      frequency1: Number(p.f1.toFixed(2)),
      parameters: { A1: p.A1, lam1: p.lam1, f1: p.f1, A2: p.A2, lam2: p.lam2, f2: p.f2 },
    });
  }

  EurekaHost.onHostCommand((cmd) => {
    if (cmd.type === 'set_param') {
      try { setParam(cmd.param, cmd.value); } catch (e) { EurekaHost.emitError('Unknown param: ' + cmd.param); }
    } else if (cmd.type === 'set_params' && cmd.params) {
      for (const k in cmd.params) { try { setParam(k, cmd.params[k]); } catch (e) { EurekaHost.emitError('Param update failed: ' + e.message); } }
    } else if (cmd.type === 'reset') {
      setParam('A1', 1, false);
      setParam('lam1', 0.8, false);
      setParam('f1', 1, false);
      setParam('A2', 1, false);
      setParam('lam2', 0.8, false);
      setParam('f2', 1, false);
    }
  });

  const p0 = getP();
  drawWave(ctx1, p0, 0);
  drawSuperpose(ctx2, p0, 0);
  EurekaHost.emitReady(['A1', 'lam1', 'f1', 'A2', 'lam2', 'f2']);

  startRenderLoop(update);
})();
</script>
</body>
</html>
