<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>声学基础 — 音调与响度</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .sound-wrap { background: #0B1220; border-radius: 12px; padding: 16px; }
  .sound-stats { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 12px 0; }
  .sound-stat { text-align: center; min-width: 90px; }
  .sound-stat-label { font-size: 11px; color: #94A3B8; }
  .sound-stat-value { font-size: 20px; font-weight: 700; }
  .sound-stat-unit { font-size: 11px; color: #64748B; }
  .sound-stat.freq .sound-stat-value { color: #FBBF24; }
  .sound-stat.ampl .sound-stat-value { color: #38BDF8; }
  .sound-stat.wlen .sound-stat-value { color: #34D399; }
  .sound-pitch-label { text-align: center; margin-top: 6px; font-size: 14px; font-weight: 600; }
  .sound-pitch-label.high { color: #F87171; }
  .sound-pitch-label.mid { color: #FBBF24; }
  .sound-pitch-label.low { color: #34D399; }
</style>
</head>
<body>
<div class="eureka-root">
  <div class="sound-stats">
    <div class="sound-stat freq">
      <p class="sound-stat-label">频率 f</p>
      <p><span class="sound-stat-value" id="stat-f">440</span><span class="sound-stat-unit"> Hz</span></p>
    </div>
    <div class="sound-stat ampl">
      <p class="sound-stat-label">振幅 A</p>
      <p><span class="sound-stat-value" id="stat-a">1.0</span><span class="sound-stat-unit"> (相对)</span></p>
    </div>
    <div class="sound-stat wlen">
      <p class="sound-stat-label">波长 λ</p>
      <p><span class="sound-stat-value" id="stat-l">0.78</span><span class="sound-stat-unit"> m</span></p>
    </div>
  </div>
  <p class="sound-pitch-label mid" id="pitch-label">中音区 (类似钢琴中央C)</p>

  <div class="sound-wrap">
    <canvas id="sound-canvas"></canvas>
  </div>

  <div class="eureka-card">
    <h3 class="eureka-card-title">参数调节</h3>
    <div id="params-root"></div>
  </div>

  <div class="eureka-formula">
    <p class="eureka-formula-title">声波公式</p>
    <div class="eureka-formula-expression">v = fλ &nbsp;&nbsp;(空气中 v ≈ 343 m/s)</div>
    <div class="eureka-formula-expression">y = A sin(2πft) &nbsp;&nbsp; 音调由 f 决定，响度由 A 决定</div>
  </div>
</div>

<script src="/templates/_shared/experiment-core.js"></script>
<script src="/templates/_shared/physics-utils.js"></script>
<script>
(function () {
  'use strict';
  const TEMPLATE_ID = 'physics/sound';
  EurekaHost.setTemplateId(TEMPLATE_ID);

  bindParam('frequency', {
    min: 20, max: 2000, step: 1, defaultValue: 440,
    label: '频率 f', unit: 'Hz',
    container: document.getElementById('params-root'),
  });
  bindParam('amplitude', {
    min: 0.1, max: 2.0, step: 0.05, defaultValue: 1.0,
    label: '振幅 A', unit: '',
    container: document.getElementById('params-root'),
  });

  const canvas = document.getElementById('sound-canvas');
  const ctx = canvas.getContext('2d');
  setupHiDPI(canvas, ctx, 680, 320);
  const width = 680;
  const height = 320;
  const CENTER_Y = height / 2;
  const SPEED_OF_SOUND = 343; // m/s in air

  const statF = document.getElementById('stat-f');
  const statA = document.getElementById('stat-a');
  const statL = document.getElementById('stat-l');
  const pitchLabel = document.getElementById('pitch-label');

  let t0 = performance.now();

  function getPitchLabel(f) {
    if (f < 100) return { text: '低音区 (低沉轰鸣)', cls: 'low' };
    if (f < 300) return { text: '中低音区 (男声)', cls: 'low' };
    if (f < 600) return { text: '中音区 (类似钢琴中央C)', cls: 'mid' };
    if (f < 1200) return { text: '中高音区 (女声)', cls: 'mid' };
    return { text: '高音区 (尖锐鸟鸣)', cls: 'high' };
  }

  function draw(ts) {
    const f = getParam('frequency');
    const A = getParam('amplitude');
    const wavelength = SPEED_OF_SOUND / f;
    const t = (ts - t0) / 1000;

    statF.textContent = f.toFixed(0);
    statA.textContent = A.toFixed(2);
    statL.textContent = wavelength.toFixed(2);
    const pl = getPitchLabel(f);
    pitchLabel.textContent = pl.text;
    pitchLabel.className = 'sound-pitch-label ' + pl.cls;

    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = '#0B1220';
    ctx.fillRect(0, 0, width, height);

    // Draw axis
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, CENTER_Y);
    ctx.lineTo(width, CENTER_Y);
    ctx.stroke();

    // Simulate multiple wave "particles" moving right
    const particleCount = 80;
    const spacing = width / particleCount;

    for (let i = 0; i < particleCount; i++) {
      const x0 = i * spacing;
      // Wave displacement as function of position and time
      const y = A * 60 * Math.sin(2 * Math.PI * (x0 / (width / (f / 100))) - 2 * Math.PI * f * t * 0.001);
      const x = x0;
      const py = CENTER_Y + y;

      // Particle
      ctx.fillStyle = `rgba(56, 189, 248, ${0.5 + A * 0.25})`;
      ctx.beginPath();
      ctx.arc(x, py, 2 + A, 0, Math.PI * 2);
      ctx.fill();

      // Connection line (for wave shape visibility)
      if (i > 0) {
        const prevX = (i - 1) * spacing;
        const prevY = CENTER_Y + A * 60 * Math.sin(2 * Math.PI * (prevX / (width / (f / 100))) - 2 * Math.PI * f * t * 0.001);
        ctx.strokeStyle = 'rgba(56, 189, 248, 0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(prevX, prevY);
        ctx.lineTo(x, py);
        ctx.stroke();
      }
    }

    // Draw static wave snapshot (the "string" shape)
    ctx.strokeStyle = '#FBBF24';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x <= width; x += 2) {
      const y = CENTER_Y + A * 80 * Math.sin(2 * Math.PI * x / (width / (f / 200)));
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Labels
    ctx.fillStyle = '#94A3B8';
    ctx.font = '12px system-ui';
    ctx.fillText('空气质点振动', 10, 20);
    ctx.fillStyle = '#FBBF24';
    ctx.fillText('波形快照', 10, 36);

    // Wavelength annotation
    const wlPx = width / (f / 200);
    ctx.strokeStyle = '#34D399';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(width / 2 - wlPx / 2, CENTER_Y + 100);
    ctx.lineTo(width / 2 + wlPx / 2, CENTER_Y + 100);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#34D399';
    ctx.fillText('λ ≈ ' + wavelength.toFixed(2) + ' m', width / 2 - 30, CENTER_Y + 118);

    EurekaHost.emitResultUpdate({
      frequency: f,
      amplitude: A,
      wavelength: Number(wavelength.toFixed(3)),
      pitch: pl.text,
      parameters: { frequency: f, amplitude: A },
    });
  }

  startRenderLoop(draw);

  EurekaHost.onHostCommand((cmd) => {
    if (cmd.type === 'set_param') {
      try { setParam(cmd.param, cmd.value); }
      catch (e) { EurekaHost.emitError('Unknown param: ' + cmd.param); }
    } else if (cmd.type === 'reset') {
      setParam('frequency', 440, false);
      setParam('amplitude', 1.0, false);
      t0 = performance.now();
    }
  });

  EurekaHost.emitReady({
    supportedParams: [
      { name:'frequency', label:'频率', unit:'Hz', type:'number', min:20, max:2000 },
      { name:'amplitude', label:'振幅', unit:'', type:'number', min:0.1, max:2.0 },
    ],
    protocolVersion: '1.0'
  });
})();
</script>
</body>
</html>
