<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>匀变速直线运动 — 运动学</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .kinematics-canvas-wrap {
    position: relative;
    background: linear-gradient(180deg, #F8FAFC 0%, #E2E8F0 100%);
  }
  .kinematics-overlay {
    position: absolute;
    top: 12px; right: 16px;
    background: rgba(255,255,255,0.92);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.6;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .kinematics-overlay .k { color: #6B7280; }
  .kinematics-overlay .v { font-weight: 600; color: #1F2937; font-variant-numeric: tabular-nums; }
  .kinematics-overlay-row { display: flex; justify-content: space-between; gap: 16px; }
</style>
</head>
<body>
<div class="eureka-root">
  <div style="text-align:center; margin: 8px 0;">
    <span style="font-size:12px; color:#6B7280; margin-right:8px;">运动类型</span>
    <div class="eureka-segmented">
      <button class="eureka-segmented-item" data-mode="uniform">匀速</button>
      <button class="eureka-segmented-item" data-mode="accelerated">匀变速</button>
      <button class="eureka-segmented-item active" data-mode="accelerated-v0">匀变速带初速度</button>
    </div>
  </div>

  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label">位移 s</p>
      <p class="eureka-stat-value primary" id="stat-s">0.0 m</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">末速度 v</p>
      <p class="eureka-stat-value danger" id="stat-v">0.0 m/s</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">平均速度</p>
      <p class="eureka-stat-value" id="stat-avg">0.0 m/s</p>
    </div>
  </div>

  <div class="eureka-canvas-wrapper kinematics-canvas-wrap">
    <canvas id="vt-canvas" class="eureka-canvas" width="680" height="220"></canvas>
    <div class="kinematics-overlay">
      <div class="kinematics-overlay-row"><span class="k">v₀</span><span class="v" id="ov-v0">10</span></div>
      <div class="kinematics-overlay-row"><span class="k">a</span><span class="v" id="ov-a">2</span></div>
      <div class="kinematics-overlay-row"><span class="k">t</span><span class="v" id="ov-t">0.0</span></div>
      <div class="kinematics-overlay-row"><span class="k">s</span><span class="v" id="ov-s">0.0</span></div>
    </div>
  </div>

  <div class="eureka-canvas-wrapper kinematics-canvas-wrap">
    <canvas id="st-canvas" class="eureka-canvas" width="680" height="220"></canvas>
  </div>

  <div class="eureka-card">
    <h3 class="eureka-card-title">参数调节</h3>
    <div id="params-root"></div>
  </div>

  <div class="eureka-formula">
    <p class="eureka-formula-title" id="formula-title">匀变速直线运动</p>
    <div class="eureka-formula-expression" id="formula-main">s = v₀t + ½at² &nbsp;&nbsp;&nbsp; v = v₀ + at</div>
  </div>
</div>

<script src="/templates/_shared/experiment-core.js"></script>
<script src="/templates/_shared/physics-utils.js"></script>
<script>
(function () {
  'use strict';
  const TEMPLATE_ID = 'physics/motion';
  EurekaHost.setTemplateId(TEMPLATE_ID);

  const MOTION_MODES = {
    uniform:        { label: '匀速直线运动',     v0: true,  a: false, formulaTitle: '匀速直线运动',       formulaMain: 's = vt &nbsp;&nbsp;&nbsp; v = v₀ (恒定)' },
    accelerated:    { label: '匀变速直线运动',    v0: false, a: true,  formulaTitle: '匀变速直线运动',     formulaMain: 's = ½at² &nbsp;&nbsp;&nbsp; v = at' },
    'accelerated-v0': { label: '匀变速带初速度',  v0: true,  a: true,  formulaTitle: '匀变速直线运动',     formulaMain: 's = v₀t + ½at² &nbsp;&nbsp;&nbsp; v = v₀ + at' },
  };
  let currentMode = 'accelerated-v0';

  const v0Control = bindParam('v0', {
    min: 0, max: 50, step: 1, defaultValue: 10,
    label: '初速度 v₀', unit: 'm/s',
    container: document.getElementById('params-root'),
  });
  const aControl = bindParam('acceleration', {
    min: -10, max: 10, step: 0.5, defaultValue: 2,
    label: '加速度 a', unit: 'm/s²',
    container: document.getElementById('params-root'),
  });
  bindParam('time', {
    min: 0, max: 20, step: 0.5, defaultValue: 5,
    label: '时间 t', unit: 's',
    container: document.getElementById('params-root'),
  });
  bindParam('mass', {
    min: 0.1, max: 10, step: 0.1, defaultValue: 1,
    label: '质量 m', unit: 'kg',
    container: document.getElementById('params-root'),
  });

  function applyMode(mode) {
    currentMode = mode;
    const cfg = MOTION_MODES[mode];
    v0Control.element.style.display = cfg.v0 ? '' : 'none';
    aControl.element.style.display = cfg.a ? '' : 'none';
    if (!cfg.v0) setParam('v0', 0, false);
    if (!cfg.a) setParam('acceleration', 0, false);
    document.getElementById('formula-title').textContent = cfg.formulaTitle;
    document.getElementById('formula-main').innerHTML = cfg.formulaMain;
  }

  document.querySelectorAll('.eureka-segmented-item').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.eureka-segmented-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyMode(btn.dataset.mode);
      simT = 0;
      EurekaHost.emitInteraction('mode-switch', { mode: currentMode });
    });
  });

  const vtCanvas = document.getElementById('vt-canvas');
  const stCanvas = document.getElementById('st-canvas');
  const vtCtx = EurekaCanvas2D.setupHiDPI(vtCanvas, 680, 220);
  const stCtx = EurekaCanvas2D.setupHiDPI(stCanvas, 680, 220);

  const cssW = 680, cssH = 220;
  const margin = { top: 25, right: 30, bottom: 35, left: 55 };

  const ovV0 = document.getElementById('ov-v0');
  const ovA  = document.getElementById('ov-a');
  const ovT  = document.getElementById('ov-t');
  const ovS  = document.getElementById('ov-s');

  const statS = document.getElementById('stat-s');
  const statV = document.getElementById('stat-v');
  const statAvg = document.getElementById('stat-avg');

  let simT = 0;

  function getP() {
    return {
      v0: getParam('v0'),
      a: getParam('acceleration'),
      tMax: getParam('time'),
      mass: getParam('mass'),
    };
  }

  function compute(v0, a, t, mass) {
    return {
      s: EurekaPhysics.displacement(v0, a, t),
      v: EurekaPhysics.finalVelocity(v0, a, t),
      avg: EurekaPhysics.averageVelocity(v0, EurekaPhysics.finalVelocity(v0, a, t)),
      ke: EurekaPhysics.kineticEnergy(mass, EurekaPhysics.finalVelocity(v0, a, t)),
    };
  }

  function drawVT(v0, a, tMax) {
    EurekaCanvas2D.clear(vtCtx, cssW, cssH, '#F8FAFC');
    const cw = cssW - margin.left - margin.right;
    const ch = cssH - margin.top - margin.bottom;
    const ox = margin.left, oy = cssH - margin.bottom;

    const vEnd = EurekaPhysics.finalVelocity(v0, a, tMax);
    const vMin = Math.min(0, v0, vEnd);
    const vMax = Math.max(0, v0, vEnd);
    const vPad = Math.max(10, (vMax - vMin) * 0.15);
    const yMin = Math.floor(vMin - vPad);
    const yMax = Math.ceil(vMax + vPad);
    const yRange = yMax - yMin || 1;

    const yTickCount = 5;
    const yLabels = [];
    for (let i = 0; i <= yTickCount; i++) {
      yLabels.push(String(Math.round(yMin + (yRange * i / yTickCount))));
    }

    EurekaCanvas2D.drawAxis(vtCtx, ox, oy, cw, ch, {
      tickSpacing: cw / 5,
      xLabels: ['0', '4', '8', '12', '16', '20'],
      yLabels: yLabels,
    });

    vtCtx.fillStyle = '#374151';
    vtCtx.font = '13px system-ui, sans-serif';
    vtCtx.textAlign = 'center';
    vtCtx.fillText('时间 t (s)', ox + cw / 2, cssH - 6);
    vtCtx.save();
    vtCtx.translate(14, oy - ch / 2);
    vtCtx.rotate(-Math.PI / 2);
    vtCtx.fillText('速度 v (m/s)', 0, 0);
    vtCtx.restore();

    vtCtx.strokeStyle = '#3B82F6'; vtCtx.lineWidth = 2.5;
    vtCtx.beginPath();
    const vScale = ch / yRange, tScale = cw / 20;
    for (let i = 0; i <= 100; i++) {
      const t = (i / 100) * tMax;
      const v = EurekaPhysics.finalVelocity(v0, a, t);
      const px = ox + t * tScale;
      const py = oy - (v - yMin) * vScale;
      if (i === 0) vtCtx.moveTo(px, py); else vtCtx.lineTo(px, py);
    }
    vtCtx.stroke();

    const curV = EurekaPhysics.finalVelocity(v0, a, simT);
    const px = ox + simT * tScale;
    const py = oy - (curV - yMin) * vScale;
    vtCtx.fillStyle = '#EF4444';
    vtCtx.beginPath(); vtCtx.arc(px, py, 5, 0, Math.PI * 2); vtCtx.fill();
  }

  function drawST(v0, a, tMax) {
    EurekaCanvas2D.clear(stCtx, cssW, cssH, '#F8FAFC');
    const cw = cssW - margin.left - margin.right;
    const ch = cssH - margin.top - margin.bottom;
    const ox = margin.left, oy = cssH - margin.bottom;

    const sEnd = EurekaPhysics.displacement(v0, a, tMax);
    const sMin = Math.min(0, sEnd);
    const sMax = Math.max(0, sEnd);
    const sPad = Math.max(10, (sMax - sMin) * 0.15);
    const syMin = Math.floor(sMin - sPad);
    const syMax = Math.ceil(sMax + sPad);
    const syRange = syMax - syMin || 1;

    const yTickCount = 5;
    const yLabels = [];
    for (let i = 0; i <= yTickCount; i++) {
      yLabels.push(String(Math.round(syMin + (syRange * i / yTickCount))));
    }

    EurekaCanvas2D.drawAxis(stCtx, ox, oy, cw, ch, {
      tickSpacing: cw / 5,
      xLabels: ['0', '4', '8', '12', '16', '20'],
      yLabels: yLabels,
    });

    stCtx.fillStyle = '#374151';
    stCtx.font = '13px system-ui, sans-serif';
    stCtx.textAlign = 'center';
    stCtx.fillText('时间 t (s)', ox + cw / 2, cssH - 6);
    stCtx.save();
    stCtx.translate(14, oy - ch / 2);
    stCtx.rotate(-Math.PI / 2);
    stCtx.fillText('位移 s (m)', 0, 0);
    stCtx.restore();

    stCtx.strokeStyle = '#10B981'; stCtx.lineWidth = 2.5;
    stCtx.beginPath();
    const sScale = ch / syRange, tScale = cw / 20;
    for (let i = 0; i <= 100; i++) {
      const t = (i / 100) * tMax;
      const s = EurekaPhysics.displacement(v0, a, t);
      const px = ox + t * tScale;
      const py = oy - (s - syMin) * sScale;
      if (i === 0) stCtx.moveTo(px, py); else stCtx.lineTo(px, py);
    }
    stCtx.stroke();

    const curS = EurekaPhysics.displacement(v0, a, simT);
    const px = ox + simT * tScale;
    const py = oy - (curS - syMin) * sScale;
    stCtx.fillStyle = '#EF4444';
    stCtx.beginPath(); stCtx.arc(px, py, 5, 0, Math.PI * 2); stCtx.fill();
  }

  function updateUI(p, res) {
    ovV0.textContent = Number(p.v0).toFixed(1);
    ovA.textContent = Number(p.a).toFixed(1);
    ovT.textContent = Number(simT).toFixed(1);
    ovS.textContent = Number(res.s).toFixed(1);
    statS.textContent = res.s.toFixed(1) + ' m';
    statV.textContent = res.v.toFixed(1) + ' m/s';
    statAvg.textContent = res.avg.toFixed(1) + ' m/s';
  }

  function renderFrame(dt) {
    const p = getP();
    simT += dt;
    if (simT > p.tMax) simT = 0;
    const r = compute(p.v0, p.a, simT, p.mass);
    drawVT(p.v0, p.a, p.tMax);
    drawST(p.v0, p.a, p.tMax);
    updateUI(p, r);
    EurekaHost.emitResultUpdate({
      displacement: Number(r.s.toFixed(3)),
      velocity: Number(r.v.toFixed(3)),
      averageVelocity: Number(r.avg.toFixed(3)),
      kineticEnergy: Number(r.ke.toFixed(3)),
      motionMode: currentMode,
      parameters: { v0: p.v0, a: p.a, t: simT, mass: p.mass, mode: currentMode },
    });
  }

  EurekaHost.onHostCommand((cmd) => {
    if (cmd.type === 'set_param') {
      if (cmd.param === 'mode' && MOTION_MODES[cmd.value]) {
        document.querySelectorAll('.eureka-segmented-item').forEach(b => {
          b.classList.toggle('active', b.dataset.mode === cmd.value);
        });
        applyMode(cmd.value);
        simT = 0;
      } else {
        try { setParam(cmd.param, cmd.value); }
        catch (e) { EurekaHost.emitError('Unknown param: ' + cmd.param); }
      }
    } else if (cmd.type === 'set_params' && cmd.params) {
      for (const k in cmd.params) {
        if (k === 'mode' && MOTION_MODES[cmd.params[k]]) {
          document.querySelectorAll('.eureka-segmented-item').forEach(b => {
            b.classList.toggle('active', b.dataset.mode === cmd.params[k]);
          });
          applyMode(cmd.params[k]);
          simT = 0;
        } else {
          try { setParam(k, cmd.params[k]); }
          catch (e) { EurekaHost.emitError('Param update failed: ' + e.message); }
        }
      }
    } else if (cmd.type === 'reset') {
      setParam('v0', 10, false);
      setParam('acceleration', 2, false);
      setParam('time', 5, false);
      setParam('mass', 1, false);
      currentMode = 'accelerated-v0';
      document.querySelectorAll('.eureka-segmented-item').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === 'accelerated-v0');
      });
      applyMode('accelerated-v0');
      simT = 0;
    }
  });

  startRenderLoop(renderFrame);

  const initP = getP();
  const initR = compute(initP.v0, initP.a, initP.tMax, initP.mass);
  drawVT(initP.v0, initP.a, initP.tMax);
  drawST(initP.v0, initP.a, initP.tMax);
  updateUI(initP, initR);
  EurekaHost.emitReady(['v0', 'acceleration', 'time', 'mass', 'mode']);
})();
</script>
</body>
</html>
