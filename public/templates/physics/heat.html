<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>比热容 — 热学</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .heat-chart-wrap { background: #0B1220; border-radius: 12px; padding: 16px; }
  .heat-legend { display: flex; gap: 24px; justify-content: center; margin-bottom: 12px; }
  .heat-legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .heat-color-box { width: 14px; height: 14px; border-radius: 3px; }
  .heat-stats { display: flex; gap: 24px; justify-content: center; margin: 12px 0; }
  .heat-stat { text-align: center; min-width: 80px; }
  .heat-stat-label { font-size: 11px; color: #94A3B8; }
  .heat-stat-value { font-size: 20px; font-weight: 700; }
  .heat-stat-unit { font-size: 11px; color: #64748B; }
  .heat-stat.color-a .heat-stat-value { color: #FBBF24; }
  .heat-stat.color-b .heat-stat-value { color: #38BDF8; }
</style>
</head>
<body>
<div class="eureka-root">
  <div class="heat-stats">
    <div class="heat-stat color-a">
      <p class="heat-stat-label">物质 A 温度</p>
      <p><span class="heat-stat-value" id="stat-t1">20.0</span><span class="heat-stat-unit"> °C</span></p>
    </div>
    <div class="heat-stat color-b">
      <p class="heat-stat-label">物质 B 温度</p>
      <p><span class="heat-stat-value" id="stat-t2">20.0</span><span class="heat-stat-unit"> °C</span></p>
    </div>
    <div class="heat-stat">
      <p class="heat-stat-label">温差 ΔT</p>
      <p><span class="heat-stat-value" id="stat-dt">0.0</span><span class="heat-stat-unit"> °C</span></p>
    </div>
    <div class="heat-stat">
      <p class="heat-stat-label">加热时间</p>
      <p><span class="heat-stat-value" id="stat-t">0</span><span class="heat-stat-unit"> s</span></p>
    </div>
  </div>

  <div class="heat-chart-wrap">
    <div class="heat-legend">
      <div class="heat-legend-item">
        <div class="heat-color-box" style="background:#FBBF24;"></div>
        <span id="legend-a">物质 A (c=0.84 J/g°C)</span>
      </div>
      <div class="heat-legend-item">
        <div class="heat-color-box" style="background:#38BDF8;"></div>
        <span id="legend-b">物质 B (c=4.18 J/g°C)</span>
      </div>
    </div>
    <canvas id="heat-canvas"></canvas>
  </div>

  <div class="eureka-card">
    <h3 class="eureka-card-title">参数调节</h3>
    <div id="params-root"></div>
  </div>

  <div class="eureka-formula">
    <p class="eureka-formula-title">热传递公式</p>
    <div class="eureka-formula-expression">
      Q = cmΔT &nbsp;&nbsp;→&nbsp;&nbsp; ΔT = Pt / (cm)
    </div>
  </div>
</div>

<script src="/templates/_shared/experiment-core.js"></script>
<script src="/templates/_shared/physics-utils.js"></script>
<script>
(function () {
  'use strict';
  const TEMPLATE_ID = 'physics/heat';
  EurekaHost.setTemplateId(TEMPLATE_ID);

  bindParam('specificHeatA', {
    min: 0.2, max: 2.5, step: 0.01, defaultValue: 0.84,
    label: '物质 A 比热容 c₁', unit: 'J/g°C',
    container: document.getElementById('params-root'),
  });
  bindParam('specificHeatB', {
    min: 0.2, max: 2.5, step: 0.01, defaultValue: 4.18,
    label: '物质 B 比热容 c₂', unit: 'J/g°C',
    container: document.getElementById('params-root'),
  });
  bindParam('mass', {
    min: 50, max: 500, step: 10, defaultValue: 200,
    label: '质量 m', unit: 'g',
    container: document.getElementById('params-root'),
  });
  bindParam('heatingPower', {
    min: 50, max: 1000, step: 10, defaultValue: 400,
    label: '加热功率 P', unit: 'W',
    container: document.getElementById('params-root'),
  });
  bindParam('timeElapsed', {
    min: 0, max: 300, step: 1, defaultValue: 0,
    label: '加热时间 t', unit: 's',
    container: document.getElementById('params-root'),
  });

  const canvas = document.getElementById('heat-canvas');
  const ctx = canvas.getContext('2d');
  setupHiDPI(canvas, ctx, 680, 340);
  const width = 680;
  const height = 340;
  const BAR_Y = 60;
  const BAR_MAX_H = 220;
  const T_MAX = 120; // °C for scale
  const A_X = 200, B_X = 480;

  const statT1 = document.getElementById('stat-t1');
  const statT2 = document.getElementById('stat-t2');
  const statDt = document.getElementById('stat-dt');
  const statT = document.getElementById('stat-t');
  const legendA = document.getElementById('legend-a');
  const legendB = document.getElementById('legend-b');

  // Temperature history for graph
  let historyA = [];
  let historyB = [];

  function computeTempDelta(P, t, m, c) {
    // Q = Pt, ΔT = Q / (mc) = Pt / (mc)
    if (m <= 0 || c <= 0) return 0;
    return (P * t) / (m * c);
  }

  function draw() {
    const c1 = getParam('specificHeatA');
    const c2 = getParam('specificHeatB');
    const m = getParam('mass');
    const P = getParam('heatingPower');
    const t = getParam('timeElapsed');
    const T0 = 20; // initial temperature

    const dt1 = computeTempDelta(P, t, m, c1);
    const dt2 = computeTempDelta(P, t, m, c2);
    const T1 = T0 + dt1;
    const T2 = T0 + dt2;

    // Update stats
    statT1.textContent = T1.toFixed(1);
    statT2.textContent = T2.toFixed(1);
    statDt.textContent = Math.abs(T1 - T2).toFixed(1);
    statT.textContent = t.toFixed(0);
    legendA.textContent = `物质 A (c=${c1.toFixed(2)} J/g°C)`;
    legendB.textContent = `物质 B (c=${c2.toFixed(2)} J/g°C)`;

    // Clear
    ctx.clearRect(0, 0, width, height);

    // Background
    ctx.fillStyle = '#0B1220';
    ctx.fillRect(0, 0, width, height);

    // Draw axes
    drawAxis(ctx, width, height, '温度 (°C)', '容器');

    // Draw bar A
    const h1 = Math.min(BAR_MAX_H, (T1 / T_MAX) * BAR_MAX_H);
    drawEnergyBar(ctx, A_X, BAR_Y + BAR_MAX_H, BAR_MAX_H, h1, '#FBBF24', 60);
    ctx.fillStyle = '#FBBF24';
    ctx.font = 'bold 13px system-ui';
    ctx.fillText('A', A_X + 22, BAR_Y + BAR_MAX_H + 20);

    // Draw bar B
    const h2 = Math.min(BAR_MAX_H, (T2 / T_MAX) * BAR_MAX_H);
    drawEnergyBar(ctx, B_X, BAR_Y + BAR_MAX_H, BAR_MAX_H, h2, '#38BDF8', 60);
    ctx.fillStyle = '#38BDF8';
    ctx.font = 'bold 13px system-ui';
    ctx.fillText('B', B_X + 22, BAR_Y + BAR_MAX_H + 20);

    // Temperature labels on bars
    ctx.fillStyle = '#F1F5F9';
    ctx.font = '12px system-ui';
    ctx.fillText(`${T1.toFixed(1)}°C`, A_X + 8, BAR_Y + BAR_MAX_H - h1 - 6);
    ctx.fillText(`${T2.toFixed(1)}°C`, B_X + 8, BAR_Y + BAR_MAX_H - h2 - 6);

    // Scale markers
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1;
    for (let T = 0; T <= T_MAX; T += 20) {
      const y = BAR_Y + BAR_MAX_H - (T / T_MAX) * BAR_MAX_H;
      ctx.beginPath();
      ctx.moveTo(20, y);
      ctx.lineTo(width - 20, y);
      ctx.stroke();
      ctx.fillStyle = '#64748B';
      ctx.font = '11px system-ui';
      ctx.fillText(T + '°C', 4, y + 3);
    }

    // History graph (mini inset top-right)
    const gw = 200, gh = 80, gx = width - gw - 20, gy = 10;
    ctx.fillStyle = 'rgba(15,23,42,0.8)';
    ctx.fillRect(gx, gy, gw, gh);
    ctx.strokeStyle = '#334155';
    ctx.strokeRect(gx, gy, gw, gh);

    if (t > 0) {
      historyA.push(T1);
      historyB.push(T2);
      if (historyA.length > 100) { historyA.shift(); historyB.shift(); }

      // Line A
      ctx.strokeStyle = '#FBBF24';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let i = 0; i < historyA.length; i++) {
        const x = gx + (i / 100) * gw;
        const y = gy + gh - (historyA[i] / T_MAX) * gh;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Line B
      ctx.strokeStyle = '#38BDF8';
      ctx.beginPath();
      for (let i = 0; i < historyB.length; i++) {
        const x = gx + (i / 100) * gw;
        const y = gy + gh - (historyB[i] / T_MAX) * gh;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    ctx.fillStyle = '#94A3B8';
    ctx.font = '10px system-ui';
    ctx.fillText('温度-时间曲线', gx + 4, gy + 10);

    EurekaHost.emitResultUpdate({
      temperatureA: Number(T1.toFixed(2)),
      temperatureB: Number(T2.toFixed(2)),
      deltaT: Number(Math.abs(T1 - T2).toFixed(2)),
      time: t,
      parameters: { specificHeatA: c1, specificHeatB: c2, mass: m, heatingPower: P, timeElapsed: t },
    });
  }

  startRenderLoop(draw);

  EurekaHost.onHostCommand((cmd) => {
    if (cmd.type === 'set_param') {
      try { setParam(cmd.param, cmd.value); }
      catch (e) { EurekaHost.emitError('Unknown param: ' + cmd.param); }
    } else if (cmd.type === 'reset') {
      setParam('timeElapsed', 0, false);
      historyA = []; historyB = [];
    } else if (cmd.type === 'pause') {
      // stop time progression
    }
  });

  setParam('timeElapsed', 0, false);

  EurekaHost.emitReady({
    supportedParams: [
      { name:'specificHeatA', label:'物质A比热容', unit:'J/g°C', type:'number', min:0.2, max:2.5 },
      { name:'specificHeatB', label:'物质B比热容', unit:'J/g°C', type:'number', min:0.2, max:2.5 },
      { name:'mass', label:'质量', unit:'g', type:'number', min:50, max:500 },
      { name:'heatingPower', label:'加热功率', unit:'W', type:'number', min:50, max:1000 },
      { name:'timeElapsed', label:'加热时间', unit:'s', type:'number', min:0, max:300 },
    ],
    protocolVersion: '1.0'
  });
})();
</script>
</body>
</html>
