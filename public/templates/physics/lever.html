<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>杠杆原理</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .lever-canvas-wrapper {
    background: linear-gradient(180deg, #FFFBEB 0%, #FEF3C7 100%);
  }
  .lever-canvas-wrapper .eureka-canvas {
    width: 680px !important;
    height: 360px !important;
  }
</style>
</head>
<body>
<div class="eureka-root">

  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label">左侧力矩</p>
      <p class="eureka-stat-value danger" id="stat-left">0 N·cm</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">右侧力矩</p>
      <p class="eureka-stat-value success" id="stat-right">0 N·cm</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">平衡状态</p>
      <p class="eureka-stat-value" id="stat-status">平衡</p>
    </div>
  </div>

  <div class="eureka-canvas-wrapper lever-canvas-wrapper">
    <canvas id="canvas" class="eureka-canvas" width="680" height="360"></canvas>
    <span class="eureka-badge" id="status-badge">计算中…</span>
  </div>

  <div class="eureka-card">
    <h3 class="eureka-card-title">参数调节</h3>

    <div class="eureka-control">
      <div class="eureka-control-header">
        <span class="eureka-control-label">左侧力 F₁</span>
        <span class="eureka-control-value"><span id="v-lf">10</span> N</span>
      </div>
      <input id="ctl-lf" class="eureka-slider" type="range" min="1" max="100" step="1" value="10">
    </div>

    <div class="eureka-control">
      <div class="eureka-control-header">
        <span class="eureka-control-label">左侧臂长 L₁</span>
        <span class="eureka-control-value"><span id="v-la">50</span> cm</span>
      </div>
      <input id="ctl-la" class="eureka-slider" type="range" min="10" max="100" step="1" value="50">
    </div>

    <div class="eureka-control">
      <div class="eureka-control-header">
        <span class="eureka-control-label">右侧力 F₂</span>
        <span class="eureka-control-value"><span id="v-rf">10</span> N</span>
      </div>
      <input id="ctl-rf" class="eureka-slider" type="range" min="1" max="100" step="1" value="10">
    </div>

    <div class="eureka-control">
      <div class="eureka-control-header">
        <span class="eureka-control-label">右侧臂长 L₂</span>
        <span class="eureka-control-value"><span id="v-ra">50</span> cm</span>
      </div>
      <input id="ctl-ra" class="eureka-slider" type="range" min="10" max="100" step="1" value="50">
    </div>
  </div>

</div>

<script src="/templates/_shared/experiment-core.js"></script>
<script>
(function () {
  'use strict';
  const TEMPLATE_ID = 'physics/lever';
  EurekaHost.setTemplateId(TEMPLATE_ID);

  const state = { leftForce: 10, leftArm: 50, rightForce: 10, rightArm: 50 };

  const canvas = document.getElementById('canvas');
  const cssW = 680, cssH = 360;
  const ctx = EurekaCanvas.setupHiDPI(canvas, cssW, cssH);

  const ctlLF = document.getElementById('ctl-lf');
  const ctlLA = document.getElementById('ctl-la');
  const ctlRF = document.getElementById('ctl-rf');
  const ctlRA = document.getElementById('ctl-ra');
  const vLF = document.getElementById('v-lf');
  const vLA = document.getElementById('v-la');
  const vRF = document.getElementById('v-rf');
  const vRA = document.getElementById('v-ra');
  const statLeft = document.getElementById('stat-left');
  const statRight = document.getElementById('stat-right');
  const statStatus = document.getElementById('stat-status');
  const statusBadge = document.getElementById('status-badge');

  // Smooth tilt animation
  let currentAngle = 0;

  function compute() {
    const leftTorque = state.leftForce * state.leftArm;
    const rightTorque = state.rightForce * state.rightArm;
    const diff = rightTorque - leftTorque;
    const maxTorque = Math.max(leftTorque, rightTorque, 1);
    // Tilt angle in radians — capped at ±25°
    const targetAngle = EurekaFormat.clamp(diff / maxTorque * 0.45, -Math.PI / 7, Math.PI / 7);

    let statusText, statusClass;
    const rel = Math.abs(diff) / maxTorque;
    if (rel < 0.01) { statusText = '○ 平衡'; statusClass = 'info'; }
    else if (diff > 0) { statusText = '↑ 右侧下降'; statusClass = 'danger'; }
    else { statusText = '↑ 左侧下降'; statusClass = 'danger'; }

    return { leftTorque, rightTorque, targetAngle, statusText, statusClass };
  }

  function render(p) {
    EurekaCanvas.clear(ctx, cssW, cssH);

    const pivotX = cssW / 2;
    const pivotY = cssH * 0.6;

    // Ground base
    ctx.fillStyle = '#92400E';
    ctx.beginPath();
    ctx.moveTo(pivotX - 40, pivotY + 60);
    ctx.lineTo(pivotX, pivotY);
    ctx.lineTo(pivotX + 40, pivotY + 60);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = '#78350F';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Scale: 100 cm → 240px (so arm 10-100cm → 24-240px each side)
    const scale = 2.4;
    const beamHalf = 260;

    ctx.save();
    ctx.translate(pivotX, pivotY);
    ctx.rotate(p.targetAngle);

    // Beam
    ctx.fillStyle = '#D97706';
    ctx.fillRect(-beamHalf, -6, beamHalf * 2, 12);
    ctx.strokeStyle = '#78350F';
    ctx.lineWidth = 2;
    ctx.strokeRect(-beamHalf, -6, beamHalf * 2, 12);

    // Left weight
    const lx = -state.leftArm * scale;
    const lweight = Math.sqrt(state.leftForce) * 3 + 10;
    drawWeight(lx, lweight, '#EF4444', state.leftForce + 'N');
    // Left arm label
    ctx.fillStyle = '#111827';
    ctx.font = '12px system-ui';
    ctx.fillText(state.leftArm + 'cm', lx - 15, -16);

    // Right weight
    const rx = state.rightArm * scale;
    const rweight = Math.sqrt(state.rightForce) * 3 + 10;
    drawWeight(rx, rweight, '#10B981', state.rightForce + 'N');
    ctx.fillText(state.rightArm + 'cm', rx - 15, -16);

    ctx.restore();

    // Pivot point (fixed)
    ctx.fillStyle = '#1F2937';
    ctx.beginPath();
    ctx.arc(pivotX, pivotY, 6, 0, Math.PI * 2);
    ctx.fill();

    // Torque indicators
    ctx.font = 'bold 13px system-ui';
    ctx.fillStyle = '#EF4444';
    ctx.fillText('左力矩: ' + p.leftTorque + ' N·cm', 20, 28);
    ctx.fillStyle = '#10B981';
    ctx.fillText('右力矩: ' + p.rightTorque + ' N·cm', cssW - 170, 28);
  }

  function drawWeight(x, halfSize, color, label) {
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.9;
    ctx.fillRect(x - halfSize, 6, halfSize * 2, halfSize * 1.6);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#1F2937';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x - halfSize, 6, halfSize * 2, halfSize * 1.6);
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 11px system-ui';
    const tw = ctx.measureText(label).width;
    ctx.fillText(label, x - tw / 2, 6 + halfSize);
  }

  function update(emitParam) {
    const p = compute();
    vLF.textContent = state.leftForce;
    vLA.textContent = state.leftArm;
    vRF.textContent = state.rightForce;
    vRA.textContent = state.rightArm;
    statLeft.textContent = p.leftTorque + ' N·cm';
    statRight.textContent = p.rightTorque + ' N·cm';
    statStatus.textContent = p.statusText;
    statStatus.className = 'eureka-stat-value ' + p.statusClass;
    statusBadge.textContent = p.statusText;
    statusBadge.className = 'eureka-badge ' + p.statusClass;

    EurekaHost.emitResultUpdate({
      leftTorque: p.leftTorque,
      rightTorque: p.rightTorque,
      balanced: Math.abs(p.leftTorque - p.rightTorque) < 0.01,
      status: p.statusText,
    });

    if (emitParam) EurekaHost.emitParamChange(emitParam.param, emitParam.value);
  }

  function animate() {
    const p = compute();
    currentAngle += (p.targetAngle - currentAngle) * 0.08;
    render({ ...p, targetAngle: currentAngle });
    requestAnimationFrame(animate);
  }

  function wire(el, key, param) {
    el.addEventListener('input', () => {
      const v = parseFloat(el.value);
      state[key] = v;
      update({ param, value: v });
    });
  }
  wire(ctlLF, 'leftForce', 'leftForce');
  wire(ctlLA, 'leftArm', 'leftArm');
  wire(ctlRF, 'rightForce', 'rightForce');
  wire(ctlRA, 'rightArm', 'rightArm');

  EurekaHost.onHostCommand((cmd) => {
    if (cmd.type === 'set_param' && typeof cmd.param === 'string' && typeof cmd.value === 'number') {
      applyParam(cmd.param, cmd.value);
      update();
    } else if (cmd.type === 'set_params' && cmd.params) {
      for (const k in cmd.params) {
        if (Object.prototype.hasOwnProperty.call(cmd.params, k)) applyParam(k, cmd.params[k]);
      }
      update();
    } else if (cmd.type === 'reset') {
      state.leftForce = 10; state.leftArm = 50; state.rightForce = 10; state.rightArm = 50;
      ctlLF.value = 10; ctlLA.value = 50; ctlRF.value = 10; ctlRA.value = 50;
      update();
    }
  });

  function applyParam(name, value) {
    switch (name) {
      case 'leftForce':  state.leftForce  = EurekaFormat.clamp(value, 1, 100); ctlLF.value = state.leftForce; break;
      case 'leftArm':    state.leftArm    = EurekaFormat.clamp(value, 10, 100); ctlLA.value = state.leftArm; break;
      case 'rightForce': state.rightForce = EurekaFormat.clamp(value, 1, 100); ctlRF.value = state.rightForce; break;
      case 'rightArm':   state.rightArm   = EurekaFormat.clamp(value, 10, 100); ctlRA.value = state.rightArm; break;
    }
  }

  update();
  animate();
  setTimeout(() => { try { EurekaHints.show(canvas, '👆 调整左右力或臂长，观察杠杆倾斜', 5000); } catch {} }, 600);
  EurekaHost.emitReady(['leftForce', 'leftArm', 'rightForce', 'rightArm'], {
    formulas: [
      { title: '杠杆平衡条件', expression: 'F₁ × L₁ = F₂ × L₂', note: '左侧力矩 = 右侧力矩时，杠杆处于平衡状态' },
    ],
  });
})();
</script>
</body>
</html>
