<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>压强实验</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .pressure-canvas-wrapper {
    background: linear-gradient(180deg, #F0FDF4 0%, #ECFDF5 100%);
    border: 1px solid #E5E7EB;
    border-radius: 8px;
    overflow: hidden;
  }
  .pressure-canvas-wrapper canvas { max-width: 100%; height: auto; display: block; }
  .mode-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .mode-tab { flex: 1; padding: 8px; text-align: center; border: 1px solid #D1D5DB; border-radius: 6px; cursor: pointer; }
  .mode-tab.active { background: #10B981; color: white; border-color: #047857; }
</style>
</head>
<body>
<div class="eureka-root">
  <div class="mode-tabs">
    <div class="mode-tab active" id="tab-solid" onclick="switchMode('solid')">固体压强</div>
    <div class="mode-tab" id="tab-liquid" onclick="switchMode('liquid')">液体压强</div>
  </div>

  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label" id="lbl-1">压力 F</p>
      <p class="eureka-stat-value primary" id="stat-1">0 N</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label" id="lbl-2">受力面积 S</p>
      <p class="eureka-stat-value" id="stat-2">0 cm²</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">压强 p</p>
      <p class="eureka-stat-value danger" id="stat-pressure">0 Pa</p>
    </div>
  </div>

  <div class="eureka-card" style="margin-top:12px;">
    <div class="eureka-card-header">
      <span>物理可视化</span>
      <span class="badge-info" id="arch-version">v3-component · PressureEngine</span>
    </div>
    <div class="pressure-canvas-wrapper">
      <canvas id="canvas" width="640" height="300"></canvas>
    </div>
  </div>

  <div class="eureka-card" style="margin-top:12px;">
    <div class="eureka-card-header"><span>参数控制</span></div>
    <div class="eureka-controls" id="ctrls-solid">
      <div class="eureka-control">
        <label>压力 F (N)</label>
        <input type="range" class="eureka-slider" id="ctrl-force" min="10" max="500" step="10" value="50">
        <span class="eureka-slider-value" id="val-force">50</span>
      </div>
      <div class="eureka-control">
        <label>受力面积 S (cm²)</label>
        <input type="range" class="eureka-slider" id="ctrl-area" min="25" max="400" step="25" value="100">
        <span class="eureka-slider-value" id="val-area">100</span>
      </div>
    </div>
    <div class="eureka-controls" id="ctrls-liquid" style="display:none;">
      <div class="eureka-control">
        <label>液体密度 ρ (kg/m³)</label>
        <input type="range" class="eureka-slider" id="ctrl-rho" min="800" max="13600" step="100" value="1000">
        <span class="eureka-slider-value" id="val-rho">1000</span>
      </div>
      <div class="eureka-control">
        <label>深度 h (m)</label>
        <input type="range" class="eureka-slider" id="ctrl-depth" min="0.1" max="2.0" step="0.05" value="0.5">
        <span class="eureka-slider-value" id="val-depth">0.5</span>
      </div>
    </div>
  </div>
</div>

<script src="/templates/_shared/experiment-core.js"></script>
<script src="/templates/_shared/ui-core.js"></script>
<script src="/templates/_shared/component-mirror.js"></script>
<script src="/templates/_shared/physics-draw.js"></script>
<script src="/templates/_shared/physics-builder.js"></script>

<script>
(function () {
  'use strict';
  
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  const state = {
    mode: 'solid',
    force: 50,
    area: 100,
    rho: 1000,
    depth: 0.5,
    g: 9.8
  };

  window.switchMode = function(m) {
    state.mode = m;
    document.getElementById('tab-solid').className = 'mode-tab' + (m === 'solid' ? ' active' : '');
    document.getElementById('tab-liquid').className = 'mode-tab' + (m === 'liquid' ? ' active' : '');
    document.getElementById('ctrls-solid').style.display = m === 'solid' ? '' : 'none';
    document.getElementById('ctrls-liquid').style.display = m === 'liquid' ? '' : 'none';
    
    document.getElementById('lbl-1').textContent = m === 'solid' ? '压力 F' : '液体密度 ρ';
    document.getElementById('lbl-2').textContent = m === 'solid' ? '受力面积 S' : '深度 h';
    recompute();
  };

  function buildGraph() {
    const pb = new window.PhysicsBuilder();
    if (state.mode === 'solid') {
      pb.block({ id: 'Block1', force: state.force, area: state.area });
    } else {
      pb.liquidContainer({ id: 'Container1', liquidDensity: state.rho, depth: state.depth });
    }
    return pb.toSpec();
  }

  function drawBackground() {
    ctx.save();
    ctx.fillStyle = '#ECFDF5';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
  }

  async function recompute() {
    try {
      const graph = buildGraph();
      const r = await window.requestCompute('physics/pressure', {
        mode: state.mode,
        force: state.force,
        area: state.area,
        rho: state.rho,
        depth: state.depth,
        g: state.g,
        graph
      });
      applyResult(r);
    } catch (e) {
      console.error(e);
    }
  }

  function applyResult(r) {
    const v = r.values;
    document.getElementById('stat-pressure').textContent = (v.pressure || 0).toFixed(1) + ' Pa';
    if (state.mode === 'solid') {
      document.getElementById('stat-1').textContent = state.force + ' N';
      document.getElementById('stat-2').textContent = state.area + ' cm²';
    } else {
      document.getElementById('stat-1').textContent = state.rho + ' kg/m³';
      document.getElementById('stat-2').textContent = state.depth.toFixed(2) + ' m';
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();
    
    // Simplistic rendering based on ComponentMirror and draw utilities
    if (window.EurekaPhysicsDraw) {
      const PD = window.EurekaPhysicsDraw;
      if (state.mode === 'solid') {
        const cx = canvas.width / 2;
        const blockW = Math.max(60, Math.min(200, state.area));
        const blockH = 60;
        const blockY = 150;
        
        ctx.fillStyle = '#8B5CF6';
        ctx.fillRect(cx - 150, blockY + blockH, 300, 10);
        
        PD.drawGradientBlock(ctx, {
          x: cx - blockW/2, y: blockY, width: blockW, height: blockH,
          text: 'F=' + state.force + 'N', subtext: state.area + 'cm²'
        });
        
        PD.drawForceArrow(ctx, {
          x: cx, y: blockY, magnitude: state.force, direction: 'down', color: '#EF4444'
        });
      } else {
        const cx = canvas.width / 2;
        PD.drawBeaker(ctx, {
          left: cx - 100, right: cx + 100, top: 50, bottom: 250, label: '液体容器'
        });
        PD.drawLiquidFill(ctx, {
          x: cx - 100, y: 100, width: 200, height: 150, color: 'rgba(8,145,178,0.5)'
        });
        
        // Depth line
        const depthY = 100 + (state.depth / 2.0) * 150;
        ctx.strokeStyle = '#EF4444';
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(cx - 110, depthY);
        ctx.lineTo(cx + 110, depthY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#EF4444';
        ctx.fillText('h = ' + state.depth + 'm', cx + 115, depthY);
      }
    }
  }

  function bindSlider(id, key) {
    const el = document.getElementById('ctrl-' + id);
    const val = document.getElementById('val-' + id);
    el.addEventListener('input', () => {
      val.textContent = el.value;
      state[key] = parseFloat(el.value);
      recompute();
    });
  }
  
  bindSlider('force', 'force');
  bindSlider('area', 'area');
  bindSlider('rho', 'rho');
  bindSlider('depth', 'depth');

  window.EurekaHost.setTemplateId('physics/pressure');
  recompute().then(() => window.EurekaHost.emitReady(['force', 'area', 'rho', 'depth', 'mode']));
})();
</script>
</body>
</html>
