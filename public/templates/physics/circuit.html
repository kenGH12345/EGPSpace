<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>电路串并联</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .circuit-canvas-wrapper {
    background: #F9FAFB;
    border: 1px solid #E5E7EB;
    border-radius: 8px;
    overflow: hidden;
  }
  .circuit-canvas-wrapper canvas { max-width: 100%; height: auto; display: block; }
  .topology-btns { display: flex; gap: 8px; margin-top: 6px; }
  .topology-btns .eureka-btn { flex: 1; font-size: 12px; }
  .topology-btns .eureka-btn.active {
    background: #059669; color: #fff; border-color: #047857;
  }
  .switch-hit-hint {
    font-size: 11px;
    color: #64748B;
    margin-top: 4px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="eureka-root">

  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label">总电流 I</p>
      <p class="eureka-stat-value primary" id="stat-current">0.000 A</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">总功率 P</p>
      <p class="eureka-stat-value success" id="stat-power">0.0 W</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">等效电阻 R_eq</p>
      <p class="eureka-stat-value" id="stat-req">0.0 Ω</p>
    </div>
  </div>

  <div class="eureka-card" style="margin-top:12px;">
    <div class="eureka-card-header">
      <span>电路结构</span>
      <span class="badge-info" id="status-badge">串联电路</span>
    </div>
    <div class="circuit-canvas-wrapper">
      <canvas id="circuit-canvas" width="640" height="260"></canvas>
    </div>
    <div class="switch-hit-hint">点击电路图中的开关可切换开/关状态</div>
  </div>

  <div class="eureka-card" style="margin-top:12px;">
    <div class="eureka-card-header"><span>参数控制</span></div>
    <div class="eureka-controls">
      <div class="eureka-control">
        <label>拓扑</label>
        <div class="topology-btns">
          <button class="eureka-btn active" id="btn-series">串联</button>
          <button class="eureka-btn" id="btn-parallel">并联</button>
        </div>
      </div>
      <div class="eureka-control">
        <label>电池电压 U (V)</label>
        <input type="range" class="eureka-slider" id="ctrl-voltage" min="1" max="30" step="0.5" value="6">
        <span class="eureka-slider-value" id="val-voltage">6.0</span>
      </div>
      <div class="eureka-control">
        <label>电阻 R1 (Ω)</label>
        <input type="range" class="eureka-slider" id="ctrl-r1" min="0.5" max="100" step="0.5" value="10">
        <span class="eureka-slider-value" id="val-r1">10.0</span>
      </div>
      <div class="eureka-control">
        <label>电阻 R2 (Ω)</label>
        <input type="range" class="eureka-slider" id="ctrl-r2" min="0.5" max="100" step="0.5" value="10">
        <span class="eureka-slider-value" id="val-r2">10.0</span>
      </div>
    </div>
  </div>
</div>

<script src="/templates/_shared/experiment-core.js?v=2"></script>
<script src="/templates/_shared/ui-core.js"></script>
<script src="/templates/_shared/component-mirror.js"></script>
<script src="/templates/_shared/circuit-draw.js?v=2"></script>

<script>
(function () {
  'use strict';

  const canvas = document.getElementById('circuit-canvas');
  const ctx = canvas.getContext('2d');

  const state = {
    voltage: 6,
    r1: 10,
    r2: 10,
    topology: 0, // 0=series, 1=parallel
    switchMain: true,
    switch1: true,
    switch2: true,
  };

  const R_BULB = 6; // 简化灯泡电阻

  // ════════════════════════════════════════════════════════════════════════
  // Local computation — Ohm's law, no host dependency
  // ════════════════════════════════════════════════════════════════════════

  function computeLocal() {
    const U = state.voltage;
    const R1 = state.r1;
    const R2 = state.r2;

    if (state.topology === 0) {
      // Series: B1 → S总 → R1 → R2 → L总
      const isClosed = state.switchMain;
      const R_eq = R1 + R2 + R_BULB;
      const I = isClosed ? U / R_eq : 0;
      const P_total = U * I;

      return {
        current: I,
        power: P_total,
        rEq: isClosed ? R_eq : Infinity,
        perComponent: {
          B1:  { current: I, voltage: U, power: U * I, glow: 0 },
          S总: { current: I, voltage: 0, power: 0, glow: 0 },
          R1:  { current: I, voltage: I * R1, power: I * I * R1, glow: 0 },
          R2:  { current: I, voltage: I * R2, power: I * I * R2, glow: 0 },
          L总: { current: I, voltage: I * R_BULB, power: I * I * R_BULB, glow: Math.min(1.5, I * 0.5) },
        },
        badgeText: isClosed ? '串联电路 · 通路' : '串联电路 · 断路',
        badgeKind: isClosed ? 'success' : 'warning',
      };
    } else {
      // Parallel: B1 → S总 → [S1→R1→L1] ∥ [S2→R2→L2] → L总
      const mainClosed = state.switchMain;
      const b1Closed = state.switch1;
      const b2Closed = state.switch2;

      const I1 = (mainClosed && b1Closed) ? U / (R1 + R_BULB) : 0;
      const I2 = (mainClosed && b2Closed) ? U / (R2 + R_BULB) : 0;
      const I_total = I1 + I2;

      const R_branch1 = R1 + R_BULB;
      const R_branch2 = R2 + R_BULB;
      let R_eq;
      if (I_total <= 0) {
        R_eq = Infinity;
      } else {
        const g1 = 1 / R_branch1;
        const g2 = 1 / R_branch2;
        const g_total = (mainClosed && b1Closed ? g1 : 0) + (mainClosed && b2Closed ? g2 : 0);
        R_eq = g_total > 0 ? 1 / g_total : Infinity;
      }
      const P_total = U * I_total;

      let badgeText, badgeKind;
      if (!mainClosed) { badgeText = '并联电路 · 总断路'; badgeKind = 'warning'; }
      else if (!b1Closed && !b2Closed) { badgeText = '并联电路 · 分路全断'; badgeKind = 'warning'; }
      else { badgeText = '并联电路 · 通路'; badgeKind = 'success'; }

      return {
        current: I_total,
        power: P_total,
        rEq: Number.isFinite(R_eq) ? R_eq : Infinity,
        perComponent: {
          B1:  { current: I_total, voltage: U, power: U * I_total, glow: 0 },
          S总: { current: I_total, voltage: 0, power: 0, glow: 0 },
          S1:  { current: I1, voltage: 0, power: 0, glow: 0 },
          R1:  { current: I1, voltage: I1 * R1, power: I1 * I1 * R1, glow: 0 },
          L1:  { current: I1, voltage: I1 * R_BULB, power: I1 * I1 * R_BULB, glow: Math.min(1.5, I1 * 0.5) },
          S2:  { current: I2, voltage: 0, power: 0, glow: 0 },
          R2:  { current: I2, voltage: I2 * R2, power: I2 * I2 * R2, glow: 0 },
          L2:  { current: I2, voltage: I2 * R_BULB, power: I2 * I2 * R_BULB, glow: Math.min(1.5, I2 * 0.5) },
          L总: { current: I_total, voltage: I_total * R_BULB, power: I_total * I_total * R_BULB, glow: Math.min(1.5, I_total * 0.5) },
        },
        badgeText, badgeKind,
      };
    }
  }

  async function recompute() {
    let result;
    try {
      result = await window.requestCompute('physics/circuit', {
        voltage: state.voltage,
        r1: state.r1,
        r2: state.r2,
        topology: state.topology,
        switchMain: state.switchMain,
        switch1: state.switch1,
        switch2: state.switch2,
      });
    } catch (err) {
      result = { values: computeLocal() };
    }
    applyResult(result);
  }

  function applyResult(result) {
    const v = result.values || computeLocal();
    document.getElementById('stat-current').textContent = (v.current || 0).toFixed(3) + ' A';
    document.getElementById('stat-power').textContent = (v.power || 0).toFixed(2) + ' W';
    document.getElementById('stat-req').textContent = Number.isFinite(v.rEq) ? v.rEq.toFixed(2) + ' Ω' : '∞';

    const badge = document.getElementById('status-badge');
    badge.textContent = v.badgeText || (state.topology === 0 ? '串联电路' : '并联电路');

    draw(v.perComponent || {});
  }

  // ════════════════════════════════════════════════════════════════════════
  // Drawing helpers
  // ════════════════════════════════════════════════════════════════════════

  function drawWire(x1, y1, x2, y2, current) {
    ctx.save();
    ctx.strokeStyle = current > 0 ? '#F59E0B' : '#64748B';
    ctx.lineWidth = Math.min(4, 1.5 + Math.abs(current || 0) * 0.5);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();
  }

  function makeComp(id, kind, x, y, props) {
    return { id: id, domain: 'circuit', kind: kind, anchor: { x: x, y: y }, props: props || {} };
  }

  // ════════════════════════════════════════════════════════════════════════
  // Series layout
  // ════════════════════════════════════════════════════════════════════════

  function drawSeries(perComp) {
    const yWire = 130;
    const yComp = 110;
    const returnY = 25;

    const comps = [
      makeComp('B1',  'battery',  30,  yComp, { voltage: state.voltage }),
      makeComp('S总', 'switch',   120, yComp, { closed: state.switchMain }),
      makeComp('R1',  'resistor', 220, yComp, { resistance: state.r1 }),
      makeComp('R2',  'resistor', 320, yComp, { resistance: state.r2 }),
      makeComp('L总', 'bulb',     420, yComp, { ratedPower: 2 }),
    ];

    const I = (perComp.B1 && perComp.B1.current) || 0;

    // Forward wires (bottom)
    drawWire(80,  yWire, 120, yWire, I); // B1 → S总
    drawWire(170, yWire, 220, yWire, I); // S总 → R1
    drawWire(270, yWire, 320, yWire, I); // R1 → R2
    drawWire(370, yWire, 420, yWire, I); // R2 → L总

    // Return wire (top loop)
    drawWire(470, yWire, 500, yWire, I);
    drawWire(500, yWire, 500, returnY, I);
    drawWire(500, returnY, 10, returnY, I);
    drawWire(10, returnY, 10, yWire, I);
    drawWire(10, yWire, 30, yWire, I);

    // Components
    for (const c of comps) {
      window.ComponentMirror.draw(ctx, c, perComp[c.id] || {});
    }
  }

  // ════════════════════════════════════════════════════════════════════════
  // Parallel layout
  // ════════════════════════════════════════════════════════════════════════

  function drawParallel(perComp) {
    const yMain = 130;
    const yMainComp = 110;
    const yTop = 60;
    const yTopComp = 40;
    const yBot = 200;
    const yBotComp = 180;
    const returnY = 25;

    const mainComps = [
      makeComp('B1',  'battery',  20,  yMainComp, { voltage: state.voltage }),
      makeComp('S总', 'switch',   100, yMainComp, { closed: state.switchMain }),
      makeComp('L总', 'bulb',     530, yMainComp, { ratedPower: 2 }),
    ];
    const topComps = [
      makeComp('S1', 'switch',   230, yTopComp, { closed: state.switch1 }),
      makeComp('R1', 'resistor', 340, yTopComp, { resistance: state.r1 }),
      makeComp('L1', 'bulb',     450, yTopComp, { ratedPower: 2 }),
    ];
    const botComps = [
      makeComp('S2', 'switch',   230, yBotComp, { closed: state.switch2 }),
      makeComp('R2', 'resistor', 340, yBotComp, { resistance: state.r2 }),
      makeComp('L2', 'bulb',     450, yBotComp, { ratedPower: 2 }),
    ];

    const I_total = (perComp.B1 && perComp.B1.current) || 0;
    const I1 = (perComp.S1 && perComp.S1.current) || 0;
    const I2 = (perComp.S2 && perComp.S2.current) || 0;

    // Main line
    drawWire(70,  yMain, 100, yMain, I_total); // B1 → S总
    drawWire(150, yMain, 190, yMain, I_total); // S总 → junction

    // Junction → top branch
    drawWire(190, yMain, 190, yTop, I1);
    drawWire(190, yTop,  230, yTop, I1);

    // Junction → bottom branch
    drawWire(190, yMain, 190, yBot, I2);
    drawWire(190, yBot,  230, yBot, I2);

    // Top branch internal
    drawWire(280, yTop, 340, yTop, I1); // S1 → R1
    drawWire(390, yTop, 450, yTop, I1); // R1 → L1

    // Bottom branch internal
    drawWire(280, yBot, 340, yBot, I2); // S2 → R2
    drawWire(390, yBot, 450, yBot, I2); // R2 → L2

    // Branches → merge
    drawWire(500, yTop, 520, yTop, I1);
    drawWire(520, yTop, 520, yMain, I1);
    drawWire(500, yBot, 520, yBot, I2);
    drawWire(520, yBot, 520, yMain, I2);

    // Merge → L总
    drawWire(520, yMain, 530, yMain, I_total);

    // L总 → return
    drawWire(580, yMain, 610, yMain, I_total);
    drawWire(610, yMain, 610, returnY, I_total);
    drawWire(610, returnY, 0, returnY, I_total);
    drawWire(0, returnY, 0, yMain, I_total);
    drawWire(0, yMain, 20, yMain, I_total);

    // Draw components
    for (const c of mainComps) window.ComponentMirror.draw(ctx, c, perComp[c.id] || {});
    for (const c of topComps)  window.ComponentMirror.draw(ctx, c, perComp[c.id] || {});
    for (const c of botComps)  window.ComponentMirror.draw(ctx, c, perComp[c.id] || {});
  }

  function draw(perComp) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (state.topology === 0) {
      drawSeries(perComp);
    } else {
      drawParallel(perComp);
    }
  }

  // ════════════════════════════════════════════════════════════════════════
  // Controls
  // ════════════════════════════════════════════════════════════════════════

  function bindSlider(ctrlId, valId, stateKey) {
    const ctrl = document.getElementById(ctrlId);
    const val = document.getElementById(valId);
    if (!ctrl || !val) return;
    val.textContent = parseFloat(ctrl.value).toFixed(1);
    ctrl.addEventListener('input', function () {
      val.textContent = parseFloat(ctrl.value).toFixed(1);
      state[stateKey] = parseFloat(ctrl.value);
      recompute();
    });
  }
  bindSlider('ctrl-voltage', 'val-voltage', 'voltage');
  bindSlider('ctrl-r1', 'val-r1', 'r1');
  bindSlider('ctrl-r2', 'val-r2', 'r2');

  // Topology buttons
  const btnSeries = document.getElementById('btn-series');
  const btnParallel = document.getElementById('btn-parallel');

  btnSeries.addEventListener('click', function () {
    if (state.topology === 0) return;
    state.topology = 0;
    btnSeries.classList.add('active');
    btnParallel.classList.remove('active');
    recompute();
  });

  btnParallel.addEventListener('click', function () {
    if (state.topology === 1) return;
    state.topology = 1;
    btnParallel.classList.add('active');
    btnSeries.classList.remove('active');
    recompute();
  });

  // Canvas click — toggle switches
  canvas.addEventListener('click', function (e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    if (state.topology === 0) {
      // S总 hit box [120, 170] x [110, 150]
      if (x >= 120 && x <= 170 && y >= 110 && y <= 150) {
        state.switchMain = !state.switchMain;
        recompute();
      }
    } else {
      // S总 [100, 150] x [110, 150]
      if (x >= 100 && x <= 150 && y >= 110 && y <= 150) {
        state.switchMain = !state.switchMain;
        recompute();
      }
      // S1 [230, 280] x [40, 80]
      else if (x >= 230 && x <= 280 && y >= 40 && y <= 80) {
        state.switch1 = !state.switch1;
        recompute();
      }
      // S2 [230, 280] x [180, 220]
      else if (x >= 230 && x <= 280 && y >= 180 && y <= 220) {
        state.switch2 = !state.switch2;
        recompute();
      }
    }
  });

  // Initial paint + compute
  draw({});
  recompute();

  if (window.EurekaHost) {
    window.EurekaHost.setTemplateId('physics/circuit');
    window.EurekaHost.emitReady(['voltage', 'r1', 'r2', 'topology', 'switchMain', 'switch1', 'switch2']);
  }
})();
</script>
</body>
</html>
