<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>电路 v3 · 组件化</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .circuit-canvas-wrapper {
    background: #F9FAFB;
    border: 1px solid #E5E7EB;
    border-radius: 8px;
    overflow: hidden;
  }
  .circuit-canvas-wrapper canvas {
    max-width: 100%; height: auto; display: block;
  }
  .events-panel {
    min-height: 28px;
    padding: 6px 10px;
    margin-top: 6px;
    background: #FEF3C7;
    border: 1px solid #F59E0B;
    border-radius: 6px;
    font-size: 12px;
    color: #92400E;
  }
  .events-panel.empty { background: #F1F5F9; border-color: #CBD5E1; color: #64748B; }
  .badge-info { background:#DBEAFE; color:#1E40AF; padding:2px 8px; border-radius:12px; font-size:11px; }
</style>
</head>
<body>
<div class="eureka-root">

  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label">总电流 I</p>
      <p class="eureka-stat-value primary" id="stat-current">0.000 A</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">总功率 P</p>
      <p class="eureka-stat-value success" id="stat-power">0.0 W</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">等效电阻</p>
      <p class="eureka-stat-value" id="stat-req">0.0 Ω</p>
    </div>
  </div>

  <div class="eureka-card" style="margin-top:12px;">
    <div class="eureka-card-header">
      <span>电路结构</span>
      <span class="badge-info" id="arch-version">v3-component · MNA 求解</span>
    </div>
    <div class="circuit-canvas-wrapper">
      <canvas id="circuit-canvas" width="640" height="260"></canvas>
    </div>
    <div class="events-panel empty" id="events-panel">（无过载事件）</div>
  </div>

  <div class="eureka-card" style="margin-top:12px;">
    <div class="eureka-card-header"><span>参数控制</span></div>
    <div class="eureka-controls">
      <div class="eureka-control">
        <label>电池电压 U (V)</label>
        <input type="range" class="eureka-slider" id="ctrl-voltage" min="1" max="30" step="0.5" value="6">
        <span class="eureka-slider-value" id="val-voltage">6.0</span>
      </div>
      <div class="eureka-control">
        <label>电阻 R (Ω)</label>
        <input type="range" class="eureka-slider" id="ctrl-resistance" min="1" max="30" step="0.5" value="10">
        <span class="eureka-slider-value" id="val-resistance">10.0</span>
      </div>
      <div class="eureka-control">
        <label>开关</label>
        <button class="eureka-btn" id="ctrl-switch" type="button">闭合（ON）</button>
      </div>
    </div>
  </div>
</div>

<!-- L3 Atoms (load order matters) -->
<script src="/templates/_shared/experiment-core.js"></script>
<script src="/templates/_shared/ui-core.js"></script>
<script src="/templates/_shared/component-mirror.js"></script>
<script src="/templates/_shared/circuit-draw.js"></script>
<script src="/templates/_shared/circuit-builder.js"></script>

<script>
(function () {
  'use strict';

  // ════════════════════════════════════════════════════════════════════════
  // Build the circuit declaratively (L4 consumer of the new assembly layer)
  // ════════════════════════════════════════════════════════════════════════

  const circuit = new CircuitBuilder()
    .battery({ voltage: 6, id: 'B1', anchor: { x: 40,  y: 110 } })
    .switch_({ closed: true, id: 'S1', anchor: { x: 160, y: 110 } })
    .resistor({ resistance: 10, id: 'R1', anchor: { x: 280, y: 110 } })
    .bulb({ ratedPower: 2, id: 'L1', anchor: { x: 420, y: 110 } })
    .loop();

  const canvas = document.getElementById('circuit-canvas');
  const ctx = canvas.getContext('2d');
  const eventsPanel = document.getElementById('events-panel');

  let switchClosed = true;

  // ════════════════════════════════════════════════════════════════════════
  // Rendering helpers (use ComponentMirror's dispatch table)
  // ════════════════════════════════════════════════════════════════════════

  // ════════════════════════════════════════════════════════════════════════
  // Port-name → geometry mapping (semantic convention, matches circuit-draw.js)
  // ════════════════════════════════════════════════════════════════════════
  //
  // Every component occupies a 50×40 rect starting at anchor (ax, ay).
  // Horizontal lead wire is at y = ay + 20.
  //   Left port  = (ax,      ay + 20)
  //   Right port = (ax + 50, ay + 20)
  //
  // Port-name convention per kind (see src/lib/framework/domains/circuit/assembly/circuit-spec.ts):
  //   battery:            negative (left) | positive (right)
  //   switch / ammeter:   in       (left) | out      (right)
  //   wire/resistor/bulb/voltmeter: a (left) | b (right)
  //
  // This mapping is the single source of truth for "which geometric point
  // does this named port live at". It is what gives components connectivity
  // and makes the whole graph a coherent system — not a bunch of loose symbols.
  const PORT_SIDE = {
    battery:   { negative: 'left',  positive: 'right' },
    switch:    { in: 'left',        out: 'right' },
    ammeter:   { in: 'left',        out: 'right' },
    wire:      { a: 'left',         b: 'right' },
    resistor:  { a: 'left',         b: 'right' },
    bulb:      { a: 'left',         b: 'right' },
    burnt_bulb:{ a: 'left',         b: 'right' },
    voltmeter: { a: 'left',         b: 'right' },
  };

  function portPos(comp, portName) {
    const ax = (comp.anchor && comp.anchor.x) || 0;
    const ay = (comp.anchor && comp.anchor.y) || 0;
    const sideTable = PORT_SIDE[comp.kind];
    const side = sideTable ? sideTable[portName] : null;
    // Fallback: unknown kind or port → best-guess right port
    const isLeft = side === 'left';
    return {
      x: ax + (isLeft ? 0 : 50),
      y: ay + 20,
      side: isLeft ? 'left' : 'right',
    };
  }

  // Build a quick id→component lookup (components() returns a small array but
  // this keeps the connection walk O(|E|) instead of O(|E|·|V|)).
  function buildCompIndex(components) {
    const idx = Object.create(null);
    for (const c of components) idx[c.id] = c;
    return idx;
  }

  // ════════════════════════════════════════════════════════════════════════
  // drawConnectionLines — semantic connectivity rendering
  // ════════════════════════════════════════════════════════════════════════
  //
  // Walks circuit._spec.connections (the same graph the solver consumes),
  // and for every connection draws a wire between the two named ports'
  // geometric positions. If the two ports are on opposite sides (right→left)
  // of adjacent-ish components, a straight horizontal wire suffices; if
  // they're both on the same side or far apart (e.g. the closing wire
  // from last component's right back to first component's left), an
  // L-shaped or U-shaped bus wire is drawn, routing up over the row of
  // components to avoid crossing their bodies.
  //
  // This is the single source of graph visualization — any CircuitBuilder
  // topology (series, parallel, bridge …) will render correctly as long
  // as components have anchors.
  function drawConnectionLines(components, connections) {
    if (!components || !components.length) return;
    if (!connections || !connections.length) return;

    const compIndex = buildCompIndex(components);

    // Compute top bus Y: one "lane" above the highest component row.
    // All U-shaped return wires route through this bus to avoid overlap.
    let minAy = Infinity;
    for (const c of components) {
      const ay = (c.anchor && c.anchor.y) || 0;
      if (ay < minAy) minAy = ay;
    }
    const busY = Math.max(12, minAy - 50);

    ctx.save();
    ctx.strokeStyle = '#334155';     // slate-700 · solid dark
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    for (const conn of connections) {
      const fromComp = compIndex[conn.from.componentId];
      const toComp   = compIndex[conn.to.componentId];
      if (!fromComp || !toComp) continue;  // skip orphan references

      const a = portPos(fromComp, conn.from.portName);
      const b = portPos(toComp,   conn.to.portName);

      ctx.beginPath();
      if (a.y === b.y && a.side === 'right' && b.side === 'left' && a.x < b.x) {
        // Short horizontal wire between a right-port and a following left-port
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
      } else if (a.y === b.y && a.side === 'right' && b.side === 'left' && a.x >= b.x) {
        // Closing return wire: last.right → up → over → down → first.left
        const rightStub = a.x + 20;
        const leftStub  = Math.max(12, b.x - 20);
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(rightStub, a.y);
        ctx.lineTo(rightStub, busY);
        ctx.lineTo(leftStub,  busY);
        ctx.lineTo(leftStub,  b.y);
        ctx.lineTo(b.x, b.y);
      } else {
        // Generic case (parallel branches, different rows, same-side ports):
        // route via the top bus using an elbow path.
        const midY = Math.min(a.y, b.y, busY) - 10;
        const aExit = a.side === 'left' ? a.x - 15 : a.x + 15;
        const bExit = b.side === 'left' ? b.x - 15 : b.x + 15;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(aExit, a.y);
        ctx.lineTo(aExit, midY);
        ctx.lineTo(bExit, midY);
        ctx.lineTo(bExit, b.y);
        ctx.lineTo(b.x, b.y);
      }
      ctx.stroke();
    }

    ctx.restore();
  }

  function render(perComponent) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const components = circuit.components();
    // Pull the connection graph from the live builder — this is the SAME
    // data the host-side solver consumes. Visual and semantic truth align.
    const connections = circuit.toSpec().connections;
    drawConnectionLines(components, connections);
    ComponentMirror.renderAll(ctx, components, perComponent);
  }

  // ════════════════════════════════════════════════════════════════════════
  // Dispatch compute via postMessage RPC — engine.v2 runs the MNA solver
  // ════════════════════════════════════════════════════════════════════════

  let pendingCompute = false;

  async function recompute() {
    if (pendingCompute) return;  // simple debouncing
    pendingCompute = true;
    try {
      const voltage = parseFloat(document.getElementById('ctrl-voltage').value);
      const resistance = parseFloat(document.getElementById('ctrl-resistance').value);

      // Mutate the switch prop on the live builder
      const swComp = circuit.findById('S1');
      if (swComp) swComp.props.closed = switchClosed;

      const result = await window.requestCompute('physics/circuit', {
        graph: circuit.toSpec(),
        overrides: {
          B1: { voltage: voltage },
          R1: { resistance: resistance },
        },
      });

      applyResult(result);
    } catch (err) {
      console.error('[circuit-v3] compute failed:', err);
      updateStatsError(err.message || String(err));
    } finally {
      pendingCompute = false;
    }
  }

  function applyResult(result) {
    const values = result.values || {};
    const perComponent = values.perComponent || {};
    const events = values.events || [];

    // Top KPIs: pull from L1's per-component map
    let totalI = 0, totalP = 0;
    for (const id in perComponent) {
      const v = perComponent[id];
      if (v && typeof v.power === 'number') totalP += v.power;
    }
    // Battery current = current flowing out of positive terminal
    const bV = perComponent.B1;
    if (bV && typeof bV.current === 'number') totalI = Math.abs(bV.current);

    const rEq = totalI > 1e-9 ? (parseFloat(document.getElementById('ctrl-voltage').value) / totalI) : Infinity;

    EurekaUI.updateStat('stat-current', totalI.toFixed(3) + ' A');
    EurekaUI.updateStat('stat-power', totalP.toFixed(2) + ' W');
    EurekaUI.updateStat('stat-req', Number.isFinite(rEq) ? rEq.toFixed(2) + ' Ω' : '∞');

    // Events panel
    if (events.length > 0) {
      eventsPanel.classList.remove('empty');
      eventsPanel.innerHTML = events.map(e =>
        '💥 <b>' + (e.sourceRuleId || '?') + '</b> → ' + (e.reason || '') +
        (e.targetId ? ' <code>(' + e.targetId + ')</code>' : '')
      ).join('<br>');
    } else {
      eventsPanel.classList.add('empty');
      eventsPanel.textContent = '（无过载事件 · 电路稳定）';
    }

    // If burnout occurred, BurntBulb may now exist in the engine-side graph.
    // Reflect by syncing the builder's mirror: if perComponent has a key we don't know, it was spawned.
    if (values.burntCount > 0) {
      // Simple strategy: if L1 is no longer present in perComponent but a burnt_bulb is,
      // swap L1's kind client-side to visualise the outcome.
      const l1HasBurnt = Object.keys(perComponent).some(k => k !== 'L1' && perComponent[k] && perComponent[k].state === 'open');
      if (l1HasBurnt && swComp) {
        const l1 = circuit.findById('L1');
        if (l1 && l1.kind === 'bulb') l1.kind = 'burnt_bulb';
      }
    }

    render(perComponent);
  }

  function updateStatsError(msg) {
    EurekaUI.updateStat('stat-current', '— A');
    EurekaUI.updateStat('stat-power', '— W');
    EurekaUI.updateStat('stat-req', '— Ω');
    eventsPanel.classList.remove('empty');
    eventsPanel.innerHTML = '⚠ 计算失败: ' + msg;
  }

  // ════════════════════════════════════════════════════════════════════════
  // Wire up controls
  // ════════════════════════════════════════════════════════════════════════

  function bindSlider(ctrlId, valId) {
    const ctrl = document.getElementById(ctrlId);
    const val = document.getElementById(valId);
    if (!ctrl || !val) return;
    val.textContent = parseFloat(ctrl.value).toFixed(1);
    ctrl.addEventListener('input', function () {
      val.textContent = parseFloat(ctrl.value).toFixed(1);
      recompute();
    });
  }
  bindSlider('ctrl-voltage', 'val-voltage');
  bindSlider('ctrl-resistance', 'val-resistance');

  const switchBtn = document.getElementById('ctrl-switch');
  switchBtn.addEventListener('click', function () {
    switchClosed = !switchClosed;
    switchBtn.textContent = switchClosed ? '闭合（ON）' : '断开（OFF）';
    // If we had burnt the bulb, clicking switch effectively resets circuit
    // but burnout is permanent in domain — UI could provide a 'reset' separately
    recompute();
  });

  // ════════════════════════════════════════════════════════════════════════
  // Initial paint — emit ready, then fire first compute
  // ════════════════════════════════════════════════════════════════════════

  render({});  // placeholder paint with no solved values

  if (window.EurekaHost) {
    EurekaHost.emitReady('physics/circuit');
  }
  // First compute (async)
  recompute();
})();
</script>
</body>
</html>
