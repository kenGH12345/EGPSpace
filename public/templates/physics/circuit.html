<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>电路串并联</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .circuit-layout {
    display: flex;
    gap: 12px;
  }
  .circuit-sidebar {
    width: 160px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .circuit-main {
    flex: 1;
    min-width: 0;
  }
  .circuit-canvas-wrapper {
    background: linear-gradient(180deg, #ECFDF5 0%, #D1FAE5 100%);
  }
  .circuit-canvas-wrapper canvas {
    max-width: 100%;
    height: auto;
    display: block;
  }
  .circuit-stats {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .circuit-stats .eureka-stat {
    flex: 1;
    padding: 8px;
    margin-bottom: 0;
  }
  .circuit-stats .eureka-stat-value {
    font-size: 18px;
  }
  .circuit-stats .eureka-stat-label {
    font-size: 11px;
  }
  .eureka-card {
    padding: 10px;
    margin-bottom: 8px;
  }
  .eureka-card:last-child {
    margin-bottom: 0;
  }
  .eureka-card-title {
    font-size: 12px;
    margin-bottom: 4px;
  }
  .eureka-control {
    margin-bottom: 6px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--eureka-border);
  }
  .eureka-control:last-child {
    border-bottom: none;
    margin-bottom: 0;
  }
  .eureka-control-header {
    margin-bottom: 3px;
  }
  .eureka-formula {
    padding: 10px;
  }
  .eureka-formula-title {
    font-size: 11px;
    margin-bottom: 3px;
  }
  .eureka-formula-expression {
    font-size: 13px;
  }
  .eureka-formula-note {
    font-size: 9px;
  }
</style>
</head>
<body>
<div class="eureka-root">

  <div class="circuit-layout">
    <!-- 左侧边栏：AI 教学助手 -->
    <div class="circuit-sidebar">
      <div class="eureka-card">
        <h3 class="eureka-card-title">🤖 AI 教学助手</h3>
        <div style="font-size: 11px; color: var(--eureka-text-muted); line-height: 1.5;">
          <p style="margin-bottom: 6px;"><strong>串联电路：</strong></p>
          <p>电流处处相等</p>
          <p>总电压 = 各电压之和</p>
          <p>R<sub>总</sub> = R₁ + R₂</p>
          <p style="margin-top: 6px; margin-bottom: 6px;"><strong>并联电路：</strong></p>
          <p>各支路电压相等</p>
          <p>总电流 = 各电流之和</p>
          <p>1/R<sub>总</sub> = 1/R₁ + 1/R₂</p>
        </div>
      </div>
      <div class="eureka-formula">
        <p class="eureka-formula-title">核心公式</p>
        <div class="eureka-formula-expression">I = U / R</div>
        <p class="eureka-formula-note">欧姆定律是电路基础</p>
      </div>
    </div>

    <!-- 右侧主区域 -->
    <div class="circuit-main">
      <div class="circuit-stats">
        <div class="eureka-stat">
          <p class="eureka-stat-label">总电阻 R</p>
          <p class="eureka-stat-value primary" id="stat-r">20 Ω</p>
        </div>
        <div class="eureka-stat">
          <p class="eureka-stat-label">总电流 I</p>
          <p class="eureka-stat-value success" id="stat-i">0.300 A</p>
        </div>
        <div class="eureka-stat">
          <p class="eureka-stat-label">总功率 P</p>
          <p class="eureka-stat-value warning" id="stat-p">1.80 W</p>
        </div>
      </div>

      <div class="eureka-canvas-wrapper circuit-canvas-wrapper">
        <canvas id="canvas" class="eureka-canvas" width="520" height="200"></canvas>
        <div style="margin-top: 4px; text-align: center;">
          <div class="eureka-segmented" style="display: inline-flex;">
            <button class="eureka-segmented-item active" data-topology="0" style="padding: 5px 14px; font-size: 11px;">串联</button>
            <button class="eureka-segmented-item" data-topology="1" style="padding: 5px 14px; font-size: 11px;">并联</button>
          </div>
        </div>
      </div>

      <div class="eureka-card" style="margin-top: 8px;">
        <h3 class="eureka-card-title">参数调节</h3>

        <div class="eureka-control">
          <div class="eureka-control-header">
            <span class="eureka-control-label">电源电压 U</span>
            <span class="eureka-control-value"><span id="v-u">6.0</span> V</span>
          </div>
          <input id="ctl-u" class="eureka-slider" type="range" min="1" max="24" step="0.1" value="6">
        </div>

        <div class="eureka-control">
          <div class="eureka-control-header">
            <span class="eureka-control-label">电阻 R₁</span>
            <span class="eureka-control-value"><span id="v-r1">10</span> Ω</span>
          </div>
          <input id="ctl-r1" class="eureka-slider" type="range" min="0.5" max="100" step="0.5" value="10">
        </div>

        <div class="eureka-control">
          <div class="eureka-control-header">
            <span class="eureka-control-label">电阻 R₂</span>
            <span class="eureka-control-value"><span id="v-r2">10</span> Ω</span>
          </div>
          <input id="ctl-r2" class="eureka-slider" type="range" min="0.5" max="100" step="0.5" value="10">
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/templates/_shared/physics-core.js"></script>
<script>
(function () {
  'use strict';
  const TEMPLATE_ID = 'physics/circuit';
  EurekaHost.setTemplateId(TEMPLATE_ID);

  const state = { voltage: 6, r1: 10, r2: 10, topology: 0 }; // 0=series 1=parallel

  const canvas = document.getElementById('canvas');
  const cssW = 520, cssH = 200;
  const ctx = EurekaCanvas.setupHiDPI(canvas, cssW, cssH);

  const ctlU = document.getElementById('ctl-u');
  const ctlR1 = document.getElementById('ctl-r1');
  const ctlR2 = document.getElementById('ctl-r2');
  const vU = document.getElementById('v-u');
  const vR1 = document.getElementById('v-r1');
  const vR2 = document.getElementById('v-r2');
  const statR = document.getElementById('stat-r');
  const statI = document.getElementById('stat-i');
  const statP = document.getElementById('stat-p');

  function compute() {
    let Rtotal, I, I1, I2, U1, U2;
    if (state.topology === 0) {
      // Series: Rtotal = R1+R2, I same through both, U1+U2=U
      Rtotal = state.r1 + state.r2;
      I = state.voltage / Rtotal;
      I1 = I;
      I2 = I;
      U1 = I * state.r1;
      U2 = I * state.r2;
    } else {
      // Parallel: 1/Rtotal = 1/R1 + 1/R2, U same across both
      Rtotal = 1 / (1 / state.r1 + 1 / state.r2);
      I = state.voltage / Rtotal;
      U1 = state.voltage;
      U2 = state.voltage;
      I1 = state.voltage / state.r1;
      I2 = state.voltage / state.r2;
    }
    const P = state.voltage * I;
    return { Rtotal, I, I1, I2, U1, U2, P };
  }

  let animOffset = 0;

  function render(p) {
    EurekaCanvas.clear(ctx, cssW, cssH);

    if (state.topology === 0) {
      drawSeries(p);
    } else {
      drawParallel(p);
    }
  }

  function drawBattery(x, y) {
    ctx.strokeStyle = '#1F2937';
    ctx.lineWidth = 1.5;
    // Long line (positive terminal)
    ctx.beginPath();
    ctx.moveTo(x, y - 15);
    ctx.lineTo(x, y + 15);
    ctx.stroke();
    // Short line (negative terminal)
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(x - 8, y - 10);
    ctx.lineTo(x - 8, y + 10);
    ctx.stroke();
    ctx.fillStyle = '#1F2937';
    ctx.font = 'bold 12px system-ui';
    ctx.fillText(state.voltage.toFixed(1) + 'V', x - 22, y + 35);
    ctx.fillStyle = '#DC2626';
    ctx.font = 'bold 14px system-ui';
    ctx.fillText('+', x + 6, y - 18);
    ctx.fillStyle = '#2563EB';
    ctx.fillText('−', x - 22, y - 18);
  }

  function drawResistor(x, y, width, label, voltage, current) {
    const h = 16;
    // Zigzag resistor symbol
    ctx.strokeStyle = '#1F2937';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, y + h / 2);
    const segments = 6;
    for (let i = 0; i <= segments; i++) {
      const sx = x + (width * i) / segments;
      const sy = y + h / 2 + (i % 2 === 0 ? -h / 2 : h / 2);
      ctx.lineTo(sx, sy);
    }
    ctx.lineTo(x + width, y + h / 2);
    ctx.stroke();

    ctx.fillStyle = '#1F2937';
    ctx.font = 'bold 10px system-ui';
    ctx.fillText(label, x + width / 2 - 14, y - 4);
    ctx.font = '9px system-ui';
    ctx.fillStyle = '#DC2626';
    ctx.fillText('U=' + voltage.toFixed(1) + 'V', x + width / 2 - 16, y + h + 10);
    ctx.fillStyle = '#2563EB';
    ctx.fillText('I=' + current.toFixed(2) + 'A', x + width / 2 - 14, y + h + 20);
  }

  function drawWire(x1, y1, x2, y2) {
    ctx.strokeStyle = '#1F2937';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  function drawCurrentDots(x1, y1, x2, y2, current) {
    // Animated dots moving along the wire, speed ∝ current
    const speed = 0.6 + Math.min(3, current * 4);
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    const nx = dx / len, ny = dy / len;
    const spacing = 20;
    ctx.fillStyle = '#F59E0B';
    for (let t = (animOffset * speed) % spacing; t < len; t += spacing) {
      const px = x1 + nx * t;
      const py = y1 + ny * t;
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawSeries(p) {
    const left = 30, right = cssW - 30;
    const top = 40, bottom = cssH - 40;
    const midY = (top + bottom) / 2;
    const rWidth = 70;
    drawBattery(left, midY);

    // Top wire: battery+ -> R1 -> R2 -> right
    drawWire(left, top, left + 25, top);
    drawResistor(left + 25, top, rWidth, 'R₁=' + state.r1 + 'Ω', p.U1, p.I1);
    drawWire(left + 25 + rWidth, top, left + 25 + rWidth + 50, top);
    drawResistor(left + 25 + rWidth + 50, top, rWidth, 'R₂=' + state.r2 + 'Ω', p.U2, p.I2);
    drawWire(left + 25 + rWidth * 2 + 50, top, right, top);

    // Right wire down
    drawWire(right, top, right, bottom);

    // Bottom wire: right -> left
    drawWire(right, bottom, left, bottom);

    // Left wire up to battery-
    drawWire(left, bottom, left, midY + 15);

    // Left wire from battery+ up to top
    drawWire(left, midY - 15, left, top);

    // Current flow arrows
    drawCurrentDots(left + 15, top, left + 30, top, p.I);
    drawCurrentDots(left + 30 + rWidth + 8, top, left + 30 + rWidth + 40, top, p.I);
    drawCurrentDots(left + 30 + rWidth * 2 + 45, top, right - 10, top, p.I);
    drawCurrentDots(right - 10, bottom, left + 15, bottom, p.I);
  }

  function drawParallel(p) {
    // 标准并联电路：电源在左侧，上下两条平行导线，两个电阻垂直放置在中间
    const left = 30;
    const right = cssW - 30;
    const topRail = 40;
    const bottomRail = cssH - 40;
    const midY = cssH / 2;
    const rWidth = 100, rHeight = 16;
    const r1Y = topRail + 6;
    const r2Y = bottomRail - 6 - rHeight;

    // 电池
    drawBattery(left, midY);

    // 电池正极 -> 左侧分支点 -> 上导线
    drawWire(left, midY - 15, left, topRail);

    // 电池负极 <- 下导线 <- 右侧汇合点
    drawWire(left, midY + 15, left, bottomRail);

    // 左侧分支点（圆点）
    ctx.fillStyle = '#1F2937';
    ctx.beginPath();
    ctx.arc(left, topRail, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(left, bottomRail, 4, 0, Math.PI * 2);
    ctx.fill();

    // 上导线：分支点 -> R1 -> 汇合点
    drawWire(left, topRail, left + 40, topRail);
    drawWire(left + 40 + rWidth, topRail, right, topRail);

    // 下导线：分支点 -> R2 -> 汇合点
    drawWire(left, bottomRail, left + 40, bottomRail);
    drawWire(left + 40 + rWidth, bottomRail, right, bottomRail);

    // 右侧汇合点（圆点）
    ctx.fillStyle = '#1F2937';
    ctx.beginPath();
    ctx.arc(right, topRail, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(right, bottomRail, 4, 0, Math.PI * 2);
    ctx.fill();

    // 右侧垂直导线连接上下汇合点
    drawWire(right, topRail, right, bottomRail);

    // R1 - 上支路
    drawResistor(left + 40, r1Y, rWidth, 'R₁=' + state.r1 + 'Ω', p.U1, p.I1);

    // R2 - 下支路
    drawResistor(left + 40, r2Y, rWidth, 'R₂=' + state.r2 + 'Ω', p.U2, p.I2);

    // 电流流动动画
    drawCurrentDots(left + 6, topRail, left + 30, topRail, p.I);
    drawCurrentDots(left + 40 + rWidth + 5, topRail, right - 6, topRail, p.I1);
    drawCurrentDots(left + 6, bottomRail, left + 30, bottomRail, p.I);
    drawCurrentDots(left + 40 + rWidth + 5, bottomRail, right - 6, bottomRail, p.I2);
  }

  function update(emitParam) {
    const p = compute();
    vU.textContent = state.voltage.toFixed(1);
    vR1.textContent = state.r1;
    vR2.textContent = state.r2;
    statR.textContent = p.Rtotal.toFixed(2) + ' Ω';
    statI.textContent = p.I.toFixed(3) + ' A';
    statP.textContent = p.P.toFixed(2) + ' W';

    EurekaHost.emitResultUpdate({
      totalResistance: Number(p.Rtotal.toFixed(3)),
      totalCurrent: Number(p.I.toFixed(4)),
      totalPower: Number(p.P.toFixed(3)),
      topology: state.topology === 0 ? 'series' : 'parallel',
      current1: Number(p.I1.toFixed(4)),
      current2: Number(p.I2.toFixed(4)),
      voltage1: Number(p.U1.toFixed(3)),
      voltage2: Number(p.U2.toFixed(3)),
    });

    if (emitParam) EurekaHost.emitParamChange(emitParam.param, emitParam.value);
  }

  function animate() {
    animOffset += 0.5;
    const p = compute();
    render(p);
    requestAnimationFrame(animate);
  }

  function wire(el, key, param) {
    el.addEventListener('input', () => {
      const v = parseFloat(el.value);
      state[key] = v;
      update({ param, value: v });
    });
  }
  wire(ctlU, 'voltage', 'voltage');
  wire(ctlR1, 'r1', 'r1');
  wire(ctlR2, 'r2', 'r2');

  // Topology switcher
  document.querySelectorAll('.eureka-segmented-item').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.eureka-segmented-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.topology = parseInt(btn.dataset.topology, 10);
      update({ param: 'topology', value: state.topology });
      EurekaHost.emitInteraction('mode-switch', { topology: state.topology === 0 ? 'series' : 'parallel' });
    });
  });

  EurekaHost.onHostCommand((cmd) => {
    if (cmd.type === 'set_param' && typeof cmd.param === 'string' && typeof cmd.value === 'number') {
      applyParam(cmd.param, cmd.value); update();
    } else if (cmd.type === 'set_params' && cmd.params) {
      for (const k in cmd.params) {
        if (Object.prototype.hasOwnProperty.call(cmd.params, k)) applyParam(k, cmd.params[k]);
      }
      update();
    } else if (cmd.type === 'reset') {
      state.voltage = 6; state.r1 = 10; state.r2 = 10; state.topology = 0;
      ctlU.value = 6; ctlR1.value = 10; ctlR2.value = 10;
      update();
    }
  });

  function applyParam(name, value) {
    switch (name) {
      case 'voltage':  state.voltage = EurekaFormat.clamp(value, 1, 24); ctlU.value = state.voltage; break;
      case 'r1':       state.r1 = EurekaFormat.clamp(value, 0.5, 100); ctlR1.value = state.r1; break;
      case 'r2':       state.r2 = EurekaFormat.clamp(value, 0.5, 100); ctlR2.value = state.r2; break;
      case 'topology': state.topology = value === 1 ? 1 : 0;
        document.querySelectorAll('.eureka-segmented-item').forEach(b => {
          b.classList.toggle('active', parseInt(b.dataset.topology, 10) === state.topology);
        });
        break;
    }
  }

  update();
  animate();
  setTimeout(() => { try { EurekaHints.show(canvas, '👆 切换「串联/并联」观察电流变化', 5000); } catch {} }, 600);
  EurekaHost.emitReady(['voltage', 'r1', 'r2', 'topology']);
})();
</script>
</body>
</html>
