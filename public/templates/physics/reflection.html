<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>光的反射 — 平面镜</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .reflection-wrap { background: #0B1220; border-radius: 12px; position: relative; overflow: hidden; }
  .reflection-label { position: absolute; font-size: 12px; color: #94A3B8; pointer-events: none; }
  .reflection-label.light { color: #FBBF24; font-weight: 600; }
  .reflection-stat-box {
    display: flex; gap: 20px; justify-content: center; margin: 12px 0;
  }
  .reflection-stat { text-align: center; }
  .reflection-stat-label { font-size: 12px; color: #94A3B8; }
  .reflection-stat-value { font-size: 22px; font-weight: 700; color: #F1F5F9; }
  .reflection-stat-unit { font-size: 12px; color: #64748B; }
</style>
</head>
<body>
<div class="eureka-root">
  <div class="reflection-stat-box">
    <div class="reflection-stat">
      <p class="reflection-stat-label">入射角 θᵢ</p>
      <p><span class="reflection-stat-value" id="stat-i">45</span><span class="reflection-stat-unit">°</span></p>
    </div>
    <div class="reflection-stat">
      <p class="reflection-stat-label">反射角 θᵣ</p>
      <p><span class="reflection-stat-value" id="stat-r">45</span><span class="reflection-stat-unit">°</span></p>
    </div>
    <div class="reflection-stat">
      <p class="reflection-stat-label">法线偏转</p>
      <p><span class="reflection-stat-value" id="stat-n">90</span><span class="reflection-stat-unit">°</span></p>
    </div>
  </div>

  <div class="eureka-canvas-wrapper reflection-wrap">
    <svg id="reflection-svg" width="100%" height="320" viewBox="0 0 680 320">
      <!-- Background grid -->
      <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1E293B" stroke-width="0.5"/>
        </pattern>
      </defs>
      <rect width="680" height="320" fill="url(#grid)"/>

      <!-- Mirror surface -->
      <line x1="40" y1="260" x2="640" y2="260" stroke="#CBD5E1" stroke-width="3"/>
      <line x1="40" y1="264" x2="640" y2="264" stroke="#475569" stroke-width="2" stroke-dasharray="8 4"/>

      <!-- Normal line (dashed) -->
      <line x1="340" y1="260" x2="340" y2="20" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6 4"/>

      <!-- Incident ray -->
      <line id="ray-incident" x1="120" y1="40" x2="340" y2="260" stroke="#FBBF24" stroke-width="3" marker-end="url(#arrow-gold)"/>
      <!-- Reflected ray -->
      <line id="ray-reflected" x1="340" y1="260" x2="560" y2="40" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow-sky)"/>

      <!-- Angle arcs -->
      <path id="arc-incident" fill="none" stroke="#FBBF24" stroke-width="2"/>
      <path id="arc-reflected" fill="none" stroke="#38BDF8" stroke-width="2"/>

      <!-- Markers -->
      <defs>
        <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="#FBBF24"/>
        </marker>
        <marker id="arrow-sky" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="#38BDF8"/>
        </marker>
      </defs>

      <!-- Labels -->
      <text x="120" y="30" fill="#FBBF24" font-size="13" font-weight="600">入射光线</text>
      <text x="540" y="30" fill="#38BDF8" font-size="13" font-weight="600">反射光线</text>
      <text x="346" y="16" fill="#94A3B8" font-size="12">法线 N</text>
      <text x="600" y="270" fill="#CBD5E1" font-size="13" font-weight="600">镜面</text>

      <!-- Normal perpendicular mark -->
      <line x1="336" y1="253" x2="344" y2="253" stroke="#64748B" stroke-width="1"/>
      <line x1="336" y1="253" x2="336" y2="257" stroke="#64748B" stroke-width="1"/>
    </svg>
  </div>

  <div class="eureka-card">
    <h3 class="eureka-card-title">参数调节</h3>
    <div id="params-root"></div>
  </div>

  <div class="eureka-formula">
    <p class="eureka-formula-title">反射定律</p>
    <div class="eureka-formula-expression">θᵢ = θᵣ &nbsp;&nbsp; (入射角 = 反射角)</div>
  </div>
</div>

<script src="/templates/_shared/experiment-core.js"></script>
<script src="/templates/_shared/physics-utils.js"></script>
<script>
(function () {
  'use strict';
  const TEMPLATE_ID = 'physics/reflection';
  EurekaHost.setTemplateId(TEMPLATE_ID);

  bindParam('angleOfIncidence', {
    min: 0, max: 89, step: 1, defaultValue: 45,
    label: '入射角 θᵢ', unit: '°',
    container: document.getElementById('params-root'),
  });

  const elIncident = document.getElementById('ray-incident');
  const elReflected = document.getElementById('ray-reflected');
  const elArcI = document.getElementById('arc-incident');
  const elArcR = document.getElementById('arc-reflected');
  const statI = document.getElementById('stat-i');
  const statR = document.getElementById('stat-r');
  const statN = document.getElementById('stat-n');

  const CX = 340, CY = 260;
  const L = 260; // ray length

  function rad(deg) { return deg * Math.PI / 180; }

  function updateDiagram(incDeg) {
    // Normal is vertical upward (270° in canvas, -90° in standard math)
    // Incident ray comes from left.
    // In standard math: normal points up (90°).
    // Incident angle is measured from normal.
    // Incident ray direction: 90° + incDeg (to the left side)
    const incRad = rad(90 + incDeg); // from x-axis
    const x1 = CX - L * Math.cos(incRad);
    const y1 = CY - L * Math.sin(incRad);
    elIncident.setAttribute('x1', x1);
    elIncident.setAttribute('y1', y1);
    elIncident.setAttribute('x2', CX);
    elIncident.setAttribute('y2', CY);

    // Reflected ray: 90° - incDeg
    const refRad = rad(90 - incDeg);
    const x2 = CX + L * Math.cos(refRad);
    const y2 = CY - L * Math.sin(refRad);
    elReflected.setAttribute('x1', CX);
    elReflected.setAttribute('y1', CY);
    elReflected.setAttribute('x2', x2);
    elReflected.setAttribute('y2', y2);

    // Arcs for angles
    const rArc = 55;
    // Incident arc: from normal (90°) to incident ray (90+inc)
    const arcIStart = 90;
    const arcIEnd = 90 + incDeg;
    const arcIX1 = CX - rArc * Math.cos(rad(arcIStart));
    const arcIY1 = CY - rArc * Math.sin(rad(arcIStart));
    const arcIX2 = CX - rArc * Math.cos(rad(arcIEnd));
    const arcIY2 = CY - rArc * Math.sin(rad(arcIEnd));
    const largeArc1 = (arcIEnd - arcIStart) > 180 ? 1 : 0;
    elArcI.setAttribute('d', `M ${arcIX1} ${arcIY1} A ${rArc} ${rArc} 0 ${largeArc1} 1 ${arcIX2} ${arcIY2}`);

    // Reflected arc: from normal (90°) to reflected ray (90-inc)
    const arcRStart = 90;
    const arcREnd = 90 - incDeg;
    const arcRX1 = CX + rArc * Math.cos(rad(arcRStart));
    const arcRY1 = CY - rArc * Math.sin(rad(arcRStart));
    const arcRX2 = CX + rArc * Math.cos(rad(arcREnd));
    const arcRY2 = CY - rArc * Math.sin(rad(arcREnd));
    const largeArc2 = (arcRStart - arcREnd) > 180 ? 1 : 0;
    elArcR.setAttribute('d', `M ${arcRX1} ${arcRY1} A ${rArc} ${rArc} 0 ${largeArc2} 0 ${arcRX2} ${arcRY2}`);
  }

  function render() {
    const inc = getParam('angleOfIncidence');
    const refl = inc; // law of reflection
    updateDiagram(inc);
    statI.textContent = inc.toFixed(0);
    statR.textContent = refl.toFixed(0);
    statN.textContent = (90 - inc).toFixed(0);

    EurekaHost.emitResultUpdate({
      angleOfIncidence: inc,
      angleOfReflection: refl,
      normalAngle: 90 - inc,
      parameters: { angleOfIncidence: inc },
    });
  }

  EurekaHost.onHostCommand((cmd) => {
    if (cmd.type === 'set_param') {
      try { setParam(cmd.param, cmd.value); }
      catch (e) { EurekaHost.emitError('Unknown param: ' + cmd.param); }
    } else if (cmd.type === 'reset') {
      setParam('angleOfIncidence', 45, false);
    }
  });

  // Static render (no animation needed)
  render();
  setInterval(render, 16);

  EurekaHost.emitReady({
    supportedParams: [{ name:'angleOfIncidence', label:'入射角', unit:'°', type:'number', min:0, max:89 }],
    protocolVersion: '1.0'
  });
})();
</script>
</body>
</html>
