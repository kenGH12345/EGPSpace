<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>密度实验</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .density-canvas-wrapper {
    background: linear-gradient(180deg, #F0FDF4 0%, #ECFDF5 100%);
    border: 1px solid #E5E7EB;
    border-radius: 8px;
    overflow: hidden;
  }
  .density-canvas-wrapper canvas { max-width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div class="eureka-root">
  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label">质量 m</p>
      <p class="eureka-stat-value primary" id="stat-mass">0 kg</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">体积 V</p>
      <p class="eureka-stat-value" id="stat-volume">0 m³</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">密度 ρ</p>
      <p class="eureka-stat-value danger" id="stat-density">0 kg/m³</p>
    </div>
  </div>

  <div class="eureka-card" style="margin-top:12px;">
    <div class="eureka-card-header">
      <span>物理可视化</span>
      <span class="badge-info" id="arch-version">v3-component · DensityEngine</span>
    </div>
    <div class="density-canvas-wrapper">
      <canvas id="canvas" width="640" height="300"></canvas>
    </div>
  </div>

  <div class="eureka-card" style="margin-top:12px;">
    <div class="eureka-card-header"><span>参数控制</span></div>
    <div class="eureka-controls">
      <div class="eureka-control">
        <label>质量 m (kg)</label>
        <input type="range" class="eureka-slider" id="ctrl-mass" min="0.1" max="1000" step="0.1" value="100">
        <span class="eureka-slider-value" id="val-mass">100.0</span>
      </div>
      <div class="eureka-control">
        <label>体积 V (m³)</label>
        <input type="range" class="eureka-slider" id="ctrl-volume" min="0.001" max="10" step="0.001" value="1">
        <span class="eureka-slider-value" id="val-volume">1.000</span>
      </div>
    </div>
  </div>
</div>

<script src="/templates/_shared/experiment-core.js"></script>
<script src="/templates/_shared/ui-core.js"></script>
<script src="/templates/_shared/component-mirror.js"></script>
<script src="/templates/_shared/physics-draw.js"></script>
<script src="/templates/_shared/physics-builder.js"></script>

<script>
(function () {
  'use strict';
  
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  const state = {
    mass: 100,
    volume: 1
  };

  function buildGraph() {
    const pb = new window.PhysicsBuilder();
    pb.block({ id: 'Obj1', mass: state.mass, volume: state.volume });
    return pb.toSpec();
  }

  async function recompute() {
    try {
      const graph = buildGraph();
      const r = await window.requestCompute('physics/density', {
        mass: state.mass,
        volume: state.volume,
        graph
      });
      applyResult(r);
    } catch (e) {
      console.error(e);
    }
  }

  function applyResult(r) {
    const v = r.values;
    document.getElementById('stat-density').textContent = (v.density || 0).toFixed(2) + ' kg/m³';
    document.getElementById('stat-mass').textContent = state.mass + ' kg';
    document.getElementById('stat-volume').textContent = state.volume + ' m³';

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ECFDF5';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    if (window.EurekaPhysicsDraw) {
      const PD = window.EurekaPhysicsDraw;
      const cx = canvas.width / 2;
      
      const blockW = Math.max(40, Math.min(200, state.volume * 50));
      const blockH = blockW;
      
      PD.drawGradientBlock(ctx, {
        x: cx - blockW/2, y: 150 - blockH/2, width: blockW, height: blockH,
        text: state.mass + ' kg', subtext: state.volume + ' m³'
      });
    }
  }

  function bindSlider(id, key) {
    const el = document.getElementById('ctrl-' + id);
    const val = document.getElementById('val-' + id);
    el.addEventListener('input', () => {
      val.textContent = el.value;
      state[key] = parseFloat(el.value);
      recompute();
    });
  }
  
  bindSlider('mass', 'mass');
  bindSlider('volume', 'volume');

  window.EurekaHost.setTemplateId('physics/density');
  recompute().then(() => window.EurekaHost.emitReady(['mass', 'volume']));
})();
</script>
</body>
</html>
