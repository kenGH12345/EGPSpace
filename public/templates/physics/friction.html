<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>摩擦力实验</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .friction-canvas-wrapper {
    position: relative;
    background: linear-gradient(180deg, #FDE68A 0%, #FCD34D 100%);
  }
  .friction-surface-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .friction-surface-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 2px solid #D1D5DB;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: #4B5563;
    transition: all 0.2s;
  }
  .friction-surface-chip.active {
    border-color: #F59E0B;
    background: #FFFBEB;
    color: #B45309;
  }
</style>
</head>
<body>
<div class="eureka-root">

  <!-- Surface selector -->
  <div class="eureka-card" style="padding-bottom:8px;">
    <h3 class="eureka-card-title">选择接触面</h3>
    <div class="friction-surface-row" id="surface-row">
      <div class="friction-surface-chip active" data-surf="wood" data-us="0.40" data-uk="0.30">木板</div>
      <div class="friction-surface-chip" data-surf="glass" data-us="0.10" data-uk="0.08">玻璃</div>
      <div class="friction-surface-chip" data-surf="towel" data-us="0.60" data-uk="0.50">毛巾</div>
    </div>
  </div>

  <!-- Summary stats -->
  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label">正压力 N</p>
      <p class="eureka-stat-value primary" id="stat-normal">50 N</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">拉力 F</p>
      <p class="eureka-stat-value" id="stat-pull">0 N</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">摩擦力 f</p>
      <p class="eureka-stat-value danger" id="stat-friction">0 N</p>
    </div>
  </div>

  <!-- Canvas visualization -->
  <div class="eureka-canvas-wrapper friction-canvas-wrapper">
    <canvas id="canvas" class="eureka-canvas" width="680" height="400"></canvas>
    <span class="eureka-badge" id="status-badge">静止</span>
  </div>

  <!-- Parameter controls -->
  <div class="eureka-card">
    <h3 class="eureka-card-title">参数调节</h3>
    <div class="eureka-control">
      <div class="eureka-control-header">
        <span class="eureka-control-label">正压力 N</span>
        <span class="eureka-control-value"><span id="v-normal">50</span> N</span>
      </div>
      <input id="ctl-normal" class="eureka-slider" type="range" min="10" max="200" step="5" value="50">
    </div>
    <div class="eureka-control">
      <div class="eureka-control-header">
        <span class="eureka-control-label">拉力 F</span>
        <span class="eureka-control-value"><span id="v-pull">0</span> N</span>
      </div>
      <input id="ctl-pull" class="eureka-slider" type="range" min="0" max="150" step="1" value="0">
    </div>
    <div class="eureka-control">
      <div class="eureka-control-header">
        <span class="eureka-control-label">静摩擦系数 μ<sub>s</sub></span>
        <span class="eureka-control-value"><span id="v-us">0.40</span></span>
      </div>
      <input id="ctl-us" class="eureka-slider" type="range" min="0.05" max="1.0" step="0.01" value="0.40">
    </div>
    <div class="eureka-control">
      <div class="eureka-control-header">
        <span class="eureka-control-label">滑动摩擦系数 μ<sub>k</sub></span>
        <span class="eureka-control-value"><span id="v-uk">0.30</span></span>
      </div>
      <input id="ctl-uk" class="eureka-slider" type="range" min="0.03" max="0.9" step="0.01" value="0.30">
    </div>
  </div>

  <!-- Formula card -->
  <div class="eureka-formula">
    <p class="eureka-formula-title">摩擦力公式</p>
    <div class="eureka-formula-expression">f<sub>max</sub> = μ<sub>s</sub> · N　　f<sub>k</sub> = μ<sub>k</sub> · N</div>
    <p class="eureka-formula-note" id="formula-note">最大静摩擦力 = 静摩擦系数 × 正压力 · 滑动摩擦力 = 滑动摩擦系数 × 正压力</p>
  </div>
</div>

<script src="/templates/_shared/physics-core.js"></script>
<script>
(function () {
  'use strict';

  const TEMPLATE_ID = 'physics/friction';
  EurekaHost.setTemplateId(TEMPLATE_ID);

  const SURFACES = {
    wood: { name: '木板', mu_s: 0.40, mu_k: 0.30, color: '#92400E' },
    glass: { name: '玻璃', mu_s: 0.10, mu_k: 0.08, color: '#6B7280' },
    towel: { name: '毛巾', mu_s: 0.60, mu_k: 0.50, color: '#B45309' },
  };

  const state = {
    surface: 'wood',
    N: 50,       // N
    pull: 0,     // N
    mu_s: 0.40,
    mu_k: 0.30,
    status: 'static', // static | impending | sliding
    history: [], // {F, f} points for graph, max 150 points
  };

  const canvas = document.getElementById('canvas');
  const cssW = 680, cssH = 400;
  const ctx = EurekaCanvas.setupHiDPI(canvas, cssW, cssH);

  const statNormal = document.getElementById('stat-normal');
  const statPull = document.getElementById('stat-pull');
  const statFriction = document.getElementById('stat-friction');
  const statusBadge = document.getElementById('status-badge');
  const formulaNote = document.getElementById('formula-note');

  const surfaceRow = document.getElementById('surface-row');
  const ctlNormal = document.getElementById('ctl-normal');
  const ctlPull = document.getElementById('ctl-pull');
  const ctlUs = document.getElementById('ctl-us');
  const ctlUk = document.getElementById('ctl-uk');

  function computeFriction() {
    const f_max = state.mu_s * state.N;
    const f_k = state.mu_k * state.N;
    if (state.pull < f_max) {
      return { f: state.pull, status: 'static', f_max, f_k };
    } else if (Math.abs(state.pull - f_max) < 0.5) {
      return { f: f_max, status: 'impending', f_max, f_k };
    } else {
      return { f: f_k, status: 'sliding', f_max, f_k };
    }
  }

  function statusLabel(s) {
    return s === 'static' ? '静止' : s === 'impending' ? '即将滑动' : '滑动中';
  }

  function statusClass(s) {
    return s === 'static' ? 'success' : s === 'impending' ? 'warning' : 'danger';
  }

  function renderMain() {
    const p = computeFriction();
    const surf = SURFACES[state.surface];
    const blockX = 120 + (p.status === 'sliding' ? 60 : 0);
    const blockY = 200;
    const blockW = 80;
    const blockH = 50;

    // Surface
    ctx.fillStyle = surf.color;
    ctx.fillRect(50, blockY + blockH, 400, 14);
    ctx.strokeStyle = '#1F2937';
    ctx.lineWidth = 1;
    ctx.strokeRect(50, blockY + blockH, 400, 14);

    // Block
    ctx.fillStyle = '#3B82F6';
    ctx.fillRect(blockX, blockY, blockW, blockH);
    ctx.strokeStyle = '#1F2937';
    ctx.lineWidth = 2;
    ctx.strokeRect(blockX, blockY, blockW, blockH);

    // Block label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px system-ui';
    ctx.fillText('m=' + EurekaFormat.num(state.N / 9.8, 1) + 'kg', blockX + 6, blockY + 28);

    // Normal force arrow (down)
    EurekaCanvas.drawArrow(ctx, blockX + blockW / 2, blockY - 10, blockX + blockW / 2, blockY - 40, '#8B5CF6', 'N=' + state.N + 'N');

    // Pull force arrow (right)
    if (state.pull > 0) {
      const arrowLen = Math.min(state.pull * 0.8, 100);
      EurekaCanvas.drawArrow(ctx, blockX + blockW + 5, blockY + blockH / 2, blockX + blockW + 5 + arrowLen, blockY + blockH / 2, '#EF4444', 'F=' + state.pull + 'N');
    }

    // Spring dynamometer (left of block)
    ctx.strokeStyle = '#6B7280';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(blockX - 60, blockY + blockH / 2);
    ctx.lineTo(blockX - 5, blockY + blockH / 2);
    ctx.stroke();
    // Spring zigzag
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const x = blockX - 55 + i * 8;
      const y = blockY + blockH / 2 + (i % 2 === 0 ? -4 : 4);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Dynamometer box
    ctx.fillStyle = '#fff';
    ctx.fillRect(blockX - 90, blockY + blockH / 2 - 15, 35, 30);
    ctx.strokeStyle = '#4B5563';
    ctx.strokeRect(blockX - 90, blockY + blockH / 2 - 15, 35, 30);
    ctx.fillStyle = '#EF4444';
    ctx.font = 'bold 11px system-ui';
    ctx.fillText(state.pull + 'N', blockX - 85, blockY + blockH / 2 + 4);

    // Friction arrow (left, opposing motion)
    if (p.f > 0) {
      const fLen = Math.min(p.f * 0.8, 80);
      EurekaCanvas.drawArrow(ctx, blockX - 5, blockY + blockH / 2 + 20, blockX - 5 - fLen, blockY + blockH / 2 + 20, '#F59E0B', 'f=' + EurekaFormat.num(p.f, 1) + 'N');
    }

    return p;
  }

  function renderGraph() {
    const p = computeFriction();
    const gx = 480, gy = 80, gw = 180, gh = 140;
    const maxF = 150;
    const maxf = 100;

    // Graph background
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(gx, gy, gw, gh);
    ctx.strokeStyle = '#9CA3AF';
    ctx.lineWidth = 1;
    ctx.strokeRect(gx, gy, gw, gh);

    // Axes labels
    ctx.fillStyle = '#6B7280';
    ctx.font = '10px system-ui';
    ctx.fillText('f-F 关系图', gx + 5, gy - 6);
    ctx.fillText('F', gx + gw - 10, gy + gh + 12);
    ctx.fillText('f', gx - 12, gy + 10);

    // Grid lines
    ctx.strokeStyle = '#E5E7EB';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < 4; i++) {
      const x = gx + (i / 4) * gw;
      ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, gy + gh); ctx.stroke();
      const y = gy + (i / 4) * gh;
      ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gx + gw, y); ctx.stroke();
    }

    // Theoretical lines
    const fmaxPx = gy + gh - (p.f_max / maxf) * gh;
    const fkPx = gy + gh - (p.f_k / maxf) * gh;
    const fmaxX = gx + (p.f_max / maxF) * gw;

    // Static line (45° up to f_max)
    ctx.strokeStyle = '#10B981';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(gx, gy + gh);
    ctx.lineTo(fmaxX, fmaxPx);
    ctx.stroke();

    // Kinetic line (horizontal from f_max point)
    ctx.strokeStyle = '#EF4444';
    ctx.beginPath();
    ctx.moveTo(fmaxX, fkPx);
    ctx.lineTo(gx + gw, fkPx);
    ctx.stroke();
    ctx.setLineDash([]);

    // Current point
    const curX = gx + (state.pull / maxF) * gw;
    const curY = gy + gh - (p.f / maxf) * gh;
    ctx.fillStyle = '#1F2937';
    ctx.beginPath();
    ctx.arc(Math.min(curX, gx + gw - 3), Math.max(curY, gy + 3), 5, 0, Math.PI * 2);
    ctx.fill();

    // History trail
    if (state.history.length > 1) {
      ctx.strokeStyle = 'rgba(59,130,246,0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      state.history.forEach((pt, i) => {
        const hx = gx + (pt.F / maxF) * gw;
        const hy = gy + gh - (pt.f / maxf) * gh;
        if (i === 0) ctx.moveTo(Math.min(hx, gx + gw), Math.max(hy, gy));
        else ctx.lineTo(Math.min(hx, gx + gw), Math.max(hy, gy));
      });
      ctx.stroke();
    }
  }

  function render() {
    EurekaCanvas.clear(ctx, cssW, cssH);
    renderMain();
    renderGraph();
  }

  function updateAll(emitParamChange) {
    const p = computeFriction();
    state.status = p.status;

    statNormal.textContent = state.N + ' N';
    statPull.textContent = state.pull + ' N';
    statFriction.textContent = EurekaFormat.num(p.f, 1) + ' N';
    statusBadge.textContent = statusLabel(p.status) + ' · f=' + EurekaFormat.num(p.f, 1) + 'N';
    statusBadge.className = 'eureka-badge ' + statusClass(p.status);

    formulaNote.textContent = 'f_max=' + EurekaFormat.num(p.f_max, 1) + 'N · f_k=' + EurekaFormat.num(p.f_k, 1) + 'N';

    document.getElementById('v-normal').textContent = state.N;
    document.getElementById('v-pull').textContent = state.pull;
    document.getElementById('v-us').textContent = state.mu_s;
    document.getElementById('v-uk').textContent = state.mu_k;

    // Record history point
    state.history.push({ F: state.pull, f: p.f });
    if (state.history.length > 150) state.history.shift();

    render();

    EurekaHost.emitResultUpdate({
      friction: Number(p.f.toFixed(2)),
      maxStaticFriction: Number(p.f_max.toFixed(2)),
      kineticFriction: Number(p.f_k.toFixed(2)),
      status: p.status,
      pullForce: state.pull,
    });

    if (emitParamChange) {
      EurekaHost.emitParamChange(emitParamChange.param, emitParamChange.value);
    }
  }

  function selectSurface(key) {
    state.surface = key;
    const s = SURFACES[key];
    state.mu_s = s.mu_s;
    state.mu_k = s.mu_k;
    ctlUs.value = s.mu_s;
    ctlUk.value = s.mu_k;
    document.getElementById('v-us').textContent = s.mu_s;
    document.getElementById('v-uk').textContent = s.mu_k;
    state.history = [];
    surfaceRow.querySelectorAll('.friction-surface-chip').forEach(c => c.classList.remove('active'));
    surfaceRow.querySelector('[data-surf="' + key + '"]').classList.add('active');
    updateAll();
  }

  surfaceRow.addEventListener('click', (e) => {
    const chip = e.target.closest('.friction-surface-chip');
    if (!chip) return;
    selectSurface(chip.dataset.surf);
  });

  function wireSlider(el, stateKey, paramName, decimals) {
    el.addEventListener('input', () => {
      const val = parseFloat(el.value);
      state[stateKey] = val;
      document.getElementById('v-' + stateKey.replace('_', '')).textContent = decimals !== undefined ? EurekaFormat.num(val, decimals) : val;
      updateAll({ param: paramName, value: val });
    });
  }

  wireSlider(ctlNormal, 'N', 'normalForce', 0);
  wireSlider(ctlPull, 'pull', 'pullForce', 0);
  wireSlider(ctlUs, 'mu_s', 'muStatic', 2);
  wireSlider(ctlUk, 'mu_k', 'muKinetic', 2);

  EurekaHost.onHostCommand((cmd) => {
    if (cmd.type === 'set_param' && typeof cmd.param === 'string' && typeof cmd.value === 'number') {
      applyParam(cmd.param, cmd.value);
      updateAll();
    } else if (cmd.type === 'set_params' && cmd.params && typeof cmd.params === 'object') {
      for (const k in cmd.params) {
        if (Object.prototype.hasOwnProperty.call(cmd.params, k)) applyParam(k, cmd.params[k]);
      }
      updateAll();
    } else if (cmd.type === 'reset') {
      state.surface = 'wood'; state.N = 50; state.pull = 0; state.mu_s = 0.40; state.mu_k = 0.30; state.history = [];
      ctlNormal.value = 50; ctlPull.value = 0; ctlUs.value = 0.40; ctlUk.value = 0.30;
      document.getElementById('v-normal').textContent = '50';
      document.getElementById('v-pull').textContent = '0';
      document.getElementById('v-us').textContent = '0.40';
      document.getElementById('v-uk').textContent = '0.30';
      selectSurface('wood');
    }
  });

  function applyParam(name, value) {
    switch (name) {
      case 'normalForce': state.N = EurekaFormat.clamp(value, 10, 200); ctlNormal.value = state.N; break;
      case 'pullForce': state.pull = EurekaFormat.clamp(value, 0, 150); ctlPull.value = state.pull; break;
      case 'muStatic': state.mu_s = EurekaFormat.clamp(value, 0.05, 1.0); ctlUs.value = state.mu_s; break;
      case 'muKinetic': state.mu_k = EurekaFormat.clamp(value, 0.03, 0.9); ctlUk.value = state.mu_k; break;
      case 'surface': selectSurface(value); break;
    }
  }

  updateAll();

  setTimeout(() => {
    try { EurekaHints.show(canvas, '👆 逐渐增大拉力，观察静摩擦→滑动摩擦的突变', 6000); } catch {}
  }, 600);

  EurekaHost.emitReady(['normalForce', 'pullForce', 'muStatic', 'muKinetic', 'surface']);
})();
</script>
</body>
</html>
