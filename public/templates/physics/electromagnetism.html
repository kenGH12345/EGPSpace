<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>电磁感应 — 法拉第定律</title>
<link rel="stylesheet" href="/templates/_shared/ui-core.css">
<style>
  .em-svg-wrap {
    display: flex; justify-content: center; align-items: center; padding: 24px;
    background: linear-gradient(180deg, #F8FAFC 0%, #E2E8F0 100%);
  }
  .em-svg-wrap svg { max-width: 100%; }
  .em-current {
    fill: none;
    stroke: #3B82F6;
    stroke-width: 2.5;
  }
  .em-current.reverse {
    stroke: #EF4444;
  }
</style>
</head>
<body>
<div class="eureka-root">
  <div class="eureka-grid-3">
    <div class="eureka-stat">
      <p class="eureka-stat-label">磁通量 Φ</p>
      <p class="eureka-stat-value primary" id="stat-phi">0.0 Wb</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">感应电动势 ε</p>
      <p class="eureka-stat-value danger" id="stat-emf">0.0 V</p>
    </div>
    <div class="eureka-stat">
      <p class="eureka-stat-label">电流方向</p>
      <p class="eureka-stat-value" id="stat-dir">—</p>
    </div>
  </div>

  <div class="eureka-canvas-wrapper em-svg-wrap" id="svg-root"></div>

  <div class="eureka-canvas-wrapper">
    <canvas id="phi-canvas" class="eureka-canvas" width="680" height="180"></canvas>
  </div>

  <div class="eureka-card">
    <h3 class="eureka-card-title">参数调节</h3>
    <div id="params-root"></div>
  </div>

  <div class="eureka-formula">
    <p class="eureka-formula-title">法拉第电磁感应定律</p>
    <div class="eureka-formula-expression">
      ε = – dΦ/dt &nbsp;&nbsp;&nbsp; Φ = B·A
    </div>
  </div>
</div>

<script src="/templates/_shared/experiment-core.js"></script>
<script src="/templates/_shared/physics-utils.js"></script>
<script>
(function () {
  'use strict';
  const TEMPLATE_ID = 'physics/electromagnetism';
  EurekaHost.setTemplateId(TEMPLATE_ID);

  bindParam('B', { min: 0.01, max: 2, step: 0.01, defaultValue: 0.5,
    label: '磁感应强度 B', unit: 'T', container: document.getElementById('params-root'), });
  bindParam('area', { min: 0.001, max: 0.1, step: 0.001, defaultValue: 0.01,
    label: '线圈面积 A', unit: 'm²', container: document.getElementById('params-root'), });
  bindParam('speed', { min: 0.1, max: 5, step: 0.1, defaultValue: 1,
    label: '磁铁速度 v', unit: 'm/s', container: document.getElementById('params-root'), });
  bindParam('turns', { min: 1, max: 200, step: 1, defaultValue: 10,
    label: '线圈匝数 N', unit: '', container: document.getElementById('params-root'), });

  const svgRoot = document.getElementById('svg-root');
  const canvas = document.getElementById('phi-canvas');
  const ctx = EurekaCanvas2D.setupHiDPI(canvas, 680, 180);

  const statPhi = document.getElementById('stat-phi');
  const statEmf = document.getElementById('stat-emf');
  const statDir = document.getElementById('stat-dir');

  const cssW = 680, cssH = 180;
  const margin = { top: 20, right: 20, bottom: 30, left: 50 };
  let simPhase = 0;

  function getP() {
    return {
      B: getParam('B'),
      A: getParam('area'),
      v: getParam('speed'),
      N: getParam('turns'),
    };
  }

  function buildSVG(p, magnetY, emf, dir) {
    const w = 420, h = 220;
    const cx = w / 2;
    const coilTop = 80, coilH = 100, coilW = 160;
    const magnetH = 80, magnetW = 30;
    const magY = magnetY * 100;
    const magTop = magY - magnetH / 2;

    const currentClass = dir === 'clockwise' ? 'em-current' : 'em-current reverse';
    const arrowDir = dir === 'clockwise' ? '→' : '←';

    const svg = `
<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
  <!-- Background -->
  <rect x="0" y="0" width="${w}" height="${h}" fill="none" />

  <!-- Coil windings -->
  <ellipse cx="${cx}" cy="${coilTop}" rx="${coilW / 2}" ry="12" fill="none" stroke="#6B7280" stroke-width="2" />
  <rect x="${cx - coilW / 2}" y="${coilTop}" width="${coilW}" height="${coilH}" fill="none" stroke="#6B7280" stroke-width="2" />
  <ellipse cx="${cx}" cy="${coilTop + coilH}" rx="${coilW / 2}" ry="12" fill="none" stroke="#6B7280" stroke-width="2" />

  <!-- Front coil turns -->
  ${[0, 1, 2, 3, 4, 5, 6, 7].map(i => {
    const y = coilTop + 6 + i * (coilH - 12) / 7;
    return `<line x1="${cx - coilW / 2}" y1="${y}" x2="${cx - coilW / 2 - 8}" y2="${y}" stroke="#9CA3AF" stroke-width="1.5" />` +
           `<line x1="${cx + coilW / 2}" y1="${y}" x2="${cx + coilW / 2 + 8}" y2="${y}" stroke="#9CA3AF" stroke-width="1.5" />`;
  }).join('')}

  <!-- Magnet (N pole red, S pole blue) -->
  <rect x="${cx - magnetW / 2}" y="${magTop}" width="${magnetW}" height="${magnetH / 2}" fill="#EF4444" rx="2" />
  <rect x="${cx - magnetW / 2}" y="${magTop + magnetH / 2}" width="${magnetW}" height="${magnetH / 2}" fill="#3B82F6" rx="2" />
  <text x="${cx}" y="${magTop + magnetH / 4 + 5}" fill="white" font-size="13" font-weight="bold" text-anchor="middle" dominant-baseline="middle">N</text>
  <text x="${cx}" y="${magTop + 3 * magnetH / 4 + 5}" fill="white" font-size="13" font-weight="bold" text-anchor="middle" dominant-baseline="middle">S</text>

  <!-- Current direction arrow (clockwise / anti-clockwise) -->
  <path d="M ${cx + coilW / 2 + 20} ${coilTop + 20} A ${coilW / 2 + 20} ${coilH / 2} 0 0 ${dir === 'clockwise' ? 1 : 0} ${cx + coilW / 2 + 20} ${coilTop + coilH - 20}"
        class="${currentClass}" marker-end="url(#arrow)" />

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor" />
    </marker>
  </defs>

  <!-- Labels -->
  <text x="60" y="${coilTop + coilH / 2 + 5}" fill="#374151" font-size="12" font-family="system-ui,sans-serif">线圈</text>
  <text x="${cx}" y="30" fill="#6B7280" font-size="11" text-anchor="middle" font-family="system-ui,sans-serif">磁铁运动方向 ↓</text>
</svg>`;
    svgRoot.innerHTML = svg;
  }

  function drawPhiCurve(B, A, v, turns, phase) {
    EurekaCanvas2D.clear(ctx, cssW, cssH, '#F8FAFC');
    const cw = cssW - margin.left - margin.right;
    const ch = cssH - margin.top - margin.bottom;
    const ox = margin.left, oy = cssH - margin.top - ch / 2;

    EurekaCanvas2D.drawAxis(ctx, ox, oy, cw, ch, {
      tickSpacing: cw / 4,
      xLabels: ['-π', '-π/2', '0', 'π/2', 'π'],
      yLabels: ['-BA', '0', 'BA'],
    });

    ctx.fillStyle = '#374151';
    ctx.font = '12px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('相位', ox + cw / 2, cssH - 6);
    ctx.save();
    ctx.translate(14, oy - ch / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('磁通量 Φ (Wb)', 0, 0);
    ctx.restore();

    const phiMax = B * A;
    const xScale = cw / (2 * Math.PI);
    const yScale = ch / (2 * phiMax) * 0.8;

    ctx.strokeStyle = '#8B5CF6';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i <= 200; i++) {
      const t = -Math.PI + (i / 200) * (2 * Math.PI);
      const phi = phiMax * Math.cos(t + phase);
      const px = ox + (t + Math.PI) * xScale;
      const py = oy - phi * yScale;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    const curPhi = phiMax * Math.cos(phase);
    const px = ox + Math.PI * xScale;
    const py = oy - curPhi * yScale;
    ctx.fillStyle = '#EF4444';
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  function updateT() {
    const p = getP();
    const dt = 1 / 60;  // real time step (seconds)
    simPhase += p.v * dt * 2;
    if (simPhase > 2 * Math.PI) simPhase -= 2 * Math.PI;

    const B = p.B, A = p.A, v = p.v;
    const phi = B * A * Math.cos(simPhase);
    const prevPhi = B * A * Math.cos(simPhase - p.v * dt * 2);
    const dPhi = phi - prevPhi;
    const emf = EurekaPhysics.faradayEMF(dPhi, dt) * p.N;
    const dir = dPhi < 0 ? 'clockwise' : 'anticlockwise';

    const magnetY = 0.5 + 0.5 * Math.sin(simPhase);
    buildSVG(p, magnetY, Math.abs(emf), dir);
    drawPhiCurve(B, A, v, p.N, simPhase);

    statPhi.textContent = phi.toFixed(3) + ' Wb';
    statEmf.textContent = Math.abs(emf).toFixed(3) + ' V';
    statDir.textContent = dir === 'clockwise' ? '顺时针 (Lenz)' : '逆时针 (Lenz)';

    EurekaHost.emitResultUpdate({
      magneticFlux: Number(phi.toFixed(5)),
      inducedEMF: Number(emf.toFixed(5)),
      currentDirection: dir,
      parameters: { B: p.B, area: p.A, speed: p.v, turns: p.N },
    });
  }

  EurekaHost.onHostCommand((cmd) => {
    if (cmd.type === 'set_param') {
      try { setParam(cmd.param, cmd.value); } catch (e) { EurekaHost.emitError('Unknown param: ' + cmd.param); }
    } else if (cmd.type === 'set_params' && cmd.params) {
      for (const k in cmd.params) { try { setParam(k, cmd.params[k]); } catch (e) { EurekaHost.emitError('Param update failed: ' + e.message); } }
    } else if (cmd.type === 'reset') {
      setParam('B', 0.5, false);
      setParam('area', 0.01, false);
      setParam('speed', 1, false);
      setParam('turns', 10, false);
      simPhase = 0;
    }
  });

  const p0 = getP();
  buildSVG(p0, 0.5, 0, 'clockwise');
  drawPhiCurve(p0.B, p0.A, p0.v, p0.N, 0);
  EurekaHost.emitReady(['B', 'area', 'speed', 'turns']);

  startRenderLoop(updateT);
})();
</script>
</body>
</html>
